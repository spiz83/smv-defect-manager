<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening report…</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           text-align: center; padding: 56px 22px; color: #12213f; background: #f6f8fc; }
    .spin { width: 34px; height: 34px; margin: 0 auto 18px; border: 3px solid #d6deea;
            border-top-color: #2c54a8; border-radius: 50%; animation: r 0.8s linear infinite; }
    @keyframes r { to { transform: rotate(360deg); } }
    a { color: #2c54a8; }
    .msg { font-size: 17px; }
    .sub { font-size: 14px; color: #6b7686; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="spin"></div>
  <p class="msg">Opening the defect report…</p>
  <p class="sub" id="sub"></p>
  <script>
    // A share link points here as /go.html?f=<file>. We just forward to the PDF
    // in the public 'shared-pdfs' bucket. Keeping the redirect on this short
    // domain is what lets the emailed link stay short enough to auto-linkify.
    (function () {
      var f = new URLSearchParams(location.search).get('f') || '';
      var sub = document.getElementById('sub');
      if (!/^[A-Za-z0-9._-]+$/.test(f)) {
        document.querySelector('.msg').textContent = 'This link is invalid or has expired.';
        document.querySelector('.spin').style.display = 'none';
        return;
      }
      var url = 'https://cubwwnvzmeydyixhetfb.supabase.co/storage/v1/object/public/shared-pdfs/' + f;
      sub.innerHTML = 'If it doesn’t open automatically, <a href="' + url + '">tap here</a>.';
      location.replace(url);
    })();
  </script>
</body>
</html>
