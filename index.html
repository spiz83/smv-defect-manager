        // Handle text file upload for bulk address import
        function handleAddressTextUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split('\n').filter(line => line.trim());
                
                let addedCount = 0;
                let skippedCount = 0;

                lines.forEach(line => {
                    const parts = line.trim().split(',').map(p => p.trim());
                    
                    if (parts.length >= 2) {
                        const street = parts[0];
                        const suburb = parts[1];
                        const propertyNumber = parts[2] || '';

                        // Check for duplicates
                        const exists = db.getAddresses().some(a => 
                            a.street.toLowerCase() === street.toLowerCase() && 
                            a.suburb.toLowerCase() === suburb.toLowerCase()
                        );

                        if (!exists) {
                            db.addAddress({ street, suburb, propertyNumber });
                            addedCount++;
                        } else {
                            skippedCount++;
                        }
                    }
                });

                closeModal('add-address-options-modal');
                
                if (addedCount > 0) {
                    showToast(`Added ${addedCount} address(es)${skippedCount > 0 ? `, skipped ${skippedCount} duplicate(s)` : ''}`);
                } else {
                    showToast('No new addresses added', true);
                }
                
                // Reset file input
                event.target.value = '';
            };
            
            reader.readAsText(file);
        }

        // Status helpers (Open -> Pending -> Completed)
        function defectStatusOf(defect) {
            return defect.status || (defect.completed ? 'completed' : 'open');
        }

        // Left-edge status tab. Red = logged (not booked), Amber = booked in
        // (outstanding), Green = completed. Tap to advance (confirm on complete).
        function statusTab(defect) {
            const s = defectStatusOf(defect);
            const title = s === 'open' ? 'Logged — tap to book in'
                : (s === 'pending' ? 'Booked in — tap to complete'
                : 'Completed — tap to re-open');
            return `<button class="status-tab status-${s}" title="${title}" onclick="event.stopPropagation(); advanceStatus(${defect.id})"></button>`;
        }
        function advanceStatus(defectId) {
            const d = db.data.defects.find(x => x.id === defectId);
            if (!d) return;
            const s = defectStatusOf(d);
            if (s === 'open') { db.setDefectStatus(defectId, 'pending'); render(); showToast('Booked in'); }
            else if (s === 'pending') {
                if (confirm('Mark this item as completed? It will be removed from the active list.')) {
                    db.setDefectStatus(defectId, 'completed'); render(); showToast('Item completed');
                }
            } else { db.setDefectStatus(defectId, 'open'); render(); showToast('Re-opened'); }
        }

        // ---- Contractor communication tracking (#6) ----
        function commsState(defect) {
            const any = defect.lastEmailAt || defect.lastSmsAt || defect.lastUpdateAt || defect.followupAt;
            let overdue = false;
            if (defect.followupAt && !defect.completed) {
                const today = new Date().toISOString().slice(0, 10);
                overdue = String(defect.followupAt).slice(0, 10) <= today;
            }
            return { any: !!any, overdue };
        }
        function commsIcon(defect) {
            const cs = commsState(defect);
            const cls = cs.overdue ? 'comms-overdue' : (cs.any ? 'comms-set' : '');
            return `<button class="comms-btn ${cls}" title="Communication log"
                        onclick="event.stopPropagation(); openDefectComms(${defect.id})">📅</button>`;
        }
        function fmtDate(v) { return v ? String(v).slice(0, 10) : '—'; }

            const d = db.data.defects.find(x => x.id === defectId);
            if (!d) return;
            impOverlay(`
                <div id="imp-head"><strong>📇 Communication Log</strong><button id="imp-close">✕</button></div>
                <div id="imp-body">
                    <div style="font-size:14px;color:var(--text-secondary);margin-bottom:14px">${(d.description||'').replace(/</g,'&lt;')}</div>
                    <div class="cm-row"><div><div class="cm-k">Last email sent</div><div class="cm-v" id="cm-email">${fmtDate(d.lastEmailAt)}</div></div>
                        <button class="cm-now" data-f="lastEmailAt">Mark today</button></div>

        // Unified function to generate defect text for clipboard/export/email
        function generateDefectText() {
            let textContent = '';
            const bookingDates = new Set();   // attendance dates seen, for the closing line

            if (state.currentView === 'view-defects-contractor' && state.filters.contractorId) {
                // Contractor view - group by address
                const contractor = db.getContractor(state.filters.contractorId);
                const defectGroups = db.getDefectsByAddress({ contractorId: state.filters.contractorId });

                defectGroups.forEach(group => {
                    const bk = group.address ? db.getContractorBooking(contractor.id, group.address.id) : '';
                    if (bk) bookingDates.add(fmtDateNice(bk));
                    textContent += `${formatAddress(group.address)}\n`;
                    textContent += `\n${contractor.name}${bk ? '  —  Attend: ' + fmtDateNice(bk) : ''}\n`;
                    group.defects.forEach(defect => {
                        textContent += `• ${defect.location ? defect.location + ' - ' : ''}${defect.description}\n`;
                    });
                    textContent += '\n';
                });
                
            } else if (state.currentView === 'view-defects-address' && state.filters.addressId) {
                // Address view - group by contractor
                const address = db.getAddress(state.filters.addressId);
                const defects = db.getDefects({ addressId: state.filters.addressId });
                
                // Group by contractor
                const byContractor = {};
                defects.forEach(d => {
                    const contractor = db.getContractor(d.contractorId);
                    const contractorName = contractor ? contractor.name : 'Unknown Contractor';
                    if (!byContractor[contractorName]) {
                        byContractor[contractorName] = [];
                    }
                    byContractor[contractorName].push(d);
                });
                
                textContent += `${formatAddress(address)}\n`;
                
                Object.keys(byContractor).sort().forEach(contractorName => {
                    const ds = byContractor[contractorName];
                    const bk = ds[0] ? db.getContractorBooking(ds[0].contractorId, ds[0].addressId) : '';
                    if (bk) bookingDates.add(fmtDateNice(bk));
                    textContent += `\n${contractorName}${bk ? '  —  Attend: ' + fmtDateNice(bk) : ''}\n`;
                    ds.forEach(defect => {
                        textContent += `• ${defect.location ? defect.location + ' - ' : ''}${defect.description}\n`;
                    });
                });
                textContent += '\n';
                
            } else if (state.currentView === 'view-defects-trade' && state.filters) {
                // Trade view - group by address then contractor
                const { tradeName, contractorIds } = state.filters;
                const defects = db.getDefects().filter(d => contractorIds.includes(d.contractorId));
                
                // Group by address first, then by contractor
                const byAddress = {};
                defects.forEach(d => {
                    const address = db.getAddress(d.addressId);
                    const contractor = db.getContractor(d.contractorId);
                    if (!address || !contractor) return;
                    
                    const addressKey = formatAddress(address);
                    if (!byAddress[addressKey]) {
                        byAddress[addressKey] = { contractors: {} };
                    }
                    if (!byAddress[addressKey].contractors[contractor.name]) {
                        byAddress[addressKey].contractors[contractor.name] = [];
                    }
                    byAddress[addressKey].contractors[contractor.name].push(d);
                });
                
                Object.keys(byAddress).sort().forEach(addressKey => {
                    textContent += `${addressKey}\n`;
                    Object.keys(byAddress[addressKey].contractors).sort().forEach(contractorName => {
                        const ds = byAddress[addressKey].contractors[contractorName];
                        const bk = ds[0] ? db.getContractorBooking(ds[0].contractorId, ds[0].addressId) : '';
                        if (bk) bookingDates.add(fmtDateNice(bk));
                        textContent += `\n${contractorName}${bk ? '  —  Attend: ' + fmtDateNice(bk) : ''}\n`;
                        ds.forEach(defect => {
                            textContent += `• ${defect.location ? defect.location + ' - ' : ''}${defect.description}\n`;
                        });
                    });
                    textContent += '\n';
                });
                
            } else if (state.currentView === 'view-multiple-contractors' && state.filters.contractorIds) {
                // Multiple contractors view - group by address then contractor
                const defects = db.getDefects().filter(d => state.filters.contractorIds.includes(d.contractorId));
                
                const byAddress = {};
                defects.forEach(d => {
                    const address = db.getAddress(d.addressId);
                    const contractor = db.getContractor(d.contractorId);
                    if (!address || !contractor) return;
                    
                    const addressKey = formatAddress(address);
                    if (!byAddress[addressKey]) {
                        byAddress[addressKey] = { contractors: {} };
                    }
                    if (!byAddress[addressKey].contractors[contractor.name]) {
                        byAddress[addressKey].contractors[contractor.name] = [];
                    }
                    byAddress[addressKey].contractors[contractor.name].push(d);
                });
                
                Object.keys(byAddress).sort().forEach(addressKey => {
                    textContent += `${addressKey}\n`;
                    Object.keys(byAddress[addressKey].contractors).sort().forEach(contractorName => {
                        const ds = byAddress[addressKey].contractors[contractorName];
                        const bk = ds[0] ? db.getContractorBooking(ds[0].contractorId, ds[0].addressId) : '';
                        if (bk) bookingDates.add(fmtDateNice(bk));
                        textContent += `\n${contractorName}${bk ? '  —  Attend: ' + fmtDateNice(bk) : ''}\n`;
                        ds.forEach(defect => {
                            textContent += `• ${defect.location ? defect.location + ' - ' : ''}${defect.description}\n`;
                        });
                    });
                    textContent += '\n';
                });
                
            } else {
                // All defects view or fallback
                textContent = db.exportToText();
            }

            // Closing prompt for the supplier(s) to confirm their attendance date.
            if (bookingDates.size === 1) {
                textContent += `\nPlease confirm booking date of ${[...bookingDates][0]}.\n`;
            } else if (bookingDates.size > 1) {
                textContent += `\nPlease confirm the booking dates noted above.\n`;
            }

            return textContent;
        }

        function exportDefects() {
            const text = generateDefectText();
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            // Generate smart filename based on current view
            let filename = 'defects';
            const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD format
            
            if (state.currentView === 'view-defects-address' && state.filters.addressId) {
                const address = db.getAddress(state.filters.addressId);
                const lot = address.propertyNumber || 'XXX';
                const streetPrefix = address.street.replace(/\s+/g, '').substring(0, 5);
                filename = `Lot${lot}_${streetPrefix}_${today}.txt`;
            } else if (state.currentView === 'view-defects-contractor' && state.filters.contractorId) {
                const contractor = db.getContractor(state.filters.contractorId);
                const contractorPrefix = contractor.name.replace(/\s+/g, '').substring(0, 5);
                filename = `Contractor_${contractorPrefix}_${today}.txt`;
            } else if (state.currentView === 'view-multiple-contractors' && state.filters.contractorIds) {
                filename = `MultipleContractors_${today}.txt`;
            } else {
                filename = `AllDefects_${today}.txt`;
            }
            
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported to ' + filename);
        }

        function copyDefectsToClipboard() {
            const textContent = generateDefectText();
            
            // Use modern clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textContent)
                    .then(() => {
                        showToast('📋 Copied to clipboard!');
                    })
                    .catch(err => {
                        // Fallback to older method
                        fallbackCopyToClipboard(textContent);
                    });
            } else {
                // Fallback for older browsers
                fallbackCopyToClipboard(textContent);
            }
        }

        function fallbackCopyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast('📋 Copied to clipboard!');
            } catch (err) {
                showToast('Failed to copy to clipboard', true);
            }
            
            document.body.removeChild(textarea);
        }

        // Email ONE supplier their open items (with photo links) for this address
        async function emailSupplier(contractorId, addressId) {
            const c = db.getContractor(contractorId);
            const addr = formatAddress(db.getAddress(addressId));
            const defects = (db.data.defects || []).filter(d =>
                d.addressId === addressId && d.contractorId === contractorId && !d.completed);
            if (!defects.length) { showToast('No open items for this supplier', true); return; }
            if (!c) { showToast('Supplier not found', true); return; }
            // No email on file? Ask for it, validate, save so we don't ask again.
            if (!c.email) {
                const entered = prompt('No email on file for ' + c.name + '.\n\nEnter their email address — it will be saved for next time:', '');
                if (entered === null) return;                       // cancelled
                const email = entered.trim();
                if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { showToast('That doesn’t look like a valid email', true); return; }
                c.email = email; db.save();                          // persists locally + syncs to cloud
                showToast('Email saved for ' + c.name);
            }
            showToast('Preparing email…');
            const booking = db.getContractorBooking(contractorId, addressId);
            const subject = 'Defects - ' + addr;
            let body = addr + '\n\n' + c.name + '\n';
            const files = [];
            for (const d of defects) {
                body += '• ' + (d.location ? d.location + ' - ' : '') + d.description + '\n';
                if (window.CloudPhotos && window.CloudPhotos.getFiles) {
                    try { (await window.CloudPhotos.getFiles(d.id)).forEach(f => files.push(f)); } catch (e) {}
                }
            }
            if (booking) body += '\nPlease confirm booking date of ' + fmtDateNice(booking) + '.\n';

            // Prefer the share sheet so the actual photos ATTACH to the email
            // (clean), instead of pasting long, messy links. Falls back to a
            // plain mailto where attaching files isn't supported (e.g. desktop).
            if (files.length && navigator.canShare && navigator.canShare({ files })) {
                try {
                    await navigator.share({ title: subject, text: body, files });
                    return;
                } catch (e) {
                    if (e && e.name === 'AbortError') return;   // user closed the sheet
                    /* otherwise fall through to mailto */
                }
            }
            window.location.href = 'mailto:' + encodeURIComponent(c.email) +
                '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
        }

                const contractor = db.getContractor(state.filters.contractorId);
                subject = `Defect List - ${contractor.name}`;

                }
            } else if (state.currentView === 'view-defects-address' && state.filters.addressId) {
                const address = db.getAddress(state.filters.addressId);
                subject = `Defect List - ${address.street}, ${address.suburb}${address.propertyNumber ? ' - ' + address.propertyNumber : ''}`;
                
                // Collect all contractor emails for this address
                const defects = db.getDefects({ addressId: state.filters.addressId });
                const contractorEmails = [];
                const seenContractors = new Set();
                defects.forEach(d => {
                    if (!seenContractors.has(d.contractorId)) {
                        seenContractors.add(d.contractorId);
                        const contractor = db.getContractor(d.contractorId);
                        if (contractor && contractor.email && contractor.email.trim()) {
                            contractorEmails.push(contractor.email.trim());
                        }
                    }
                });
                recipient = contractorEmails.join('; ');
            } else if (state.currentView === 'view-defects-trade' && state.filters) {
                subject = `Defect List - ${state.filters.tradeName}`;
            } else if (state.currentView === 'view-multiple-contractors' && state.filters.contractorIds) {
                subject = 'Defect List - Multiple Contractors';
            } else {
                subject = 'Defect List - All Defects';
            }
            
            // Create mailto link
            const mailtoLink = recipient 
                ? `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(textContent)}`
                : `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(textContent)}`;
            
            window.location.href = mailtoLink;
            showToast('📧 Opening email client...');
        }

        function handleAddressAutocomplete(input, groupIndex) {
            const value = input.value.toLowerCase();
            const dropdown = document.getElementById(`address-dropdown-${groupIndex}`);
            
            if (!dropdown) return;
            
            const isNumeric = /^\d/.test(value);
            
            const addresses = db.getAddresses().filter(a => {
                const streetWords = a.street.toLowerCase().split(' ');
                const suburbWords = a.suburb.toLowerCase().split(' ');
                const lotNumber = a.propertyNumber ? a.propertyNumber.toLowerCase() : '';
                
                if (isNumeric) {
                    return lotNumber.startsWith(value) ||
                           streetWords.some(word => word.startsWith(value));
                }
                
                return streetWords.some(word => word.startsWith(value)) || 
                       suburbWords.some(word => word.startsWith(value));
            }).sort((a, b) => {
                if (isNumeric) {
                    const aLotMatch = a.propertyNumber && a.propertyNumber.toLowerCase().startsWith(value);
                    const bLotMatch = b.propertyNumber && b.propertyNumber.toLowerCase().startsWith(value);
                    if (aLotMatch && !bLotMatch) return -1;
                    if (!aLotMatch && bLotMatch) return 1;
                    
                    const aStreetFirst = a.street.toLowerCase().split(' ')[0];
                    const bStreetFirst = b.street.toLowerCase().split(' ')[0];
                    const aStreetMatch = aStreetFirst.startsWith(value);
                    const bStreetMatch = bStreetFirst.startsWith(value);
                    if (aStreetMatch && !bStreetMatch) return -1;
                    if (!aStreetMatch && bStreetMatch) return 1;
                } else {
                    const aStreetWords = a.street.toLowerCase().split(' ');
                    const bStreetWords = b.street.toLowerCase().split(' ');
                    
                    const aStreetMatch = aStreetWords.some(word => word.startsWith(value));
                    const bStreetMatch = bStreetWords.some(word => word.startsWith(value));
                    
                    if (aStreetMatch && !bStreetMatch) return -1;
                    if (!aStreetMatch && bStreetMatch) return 1;
                    
                    if (aStreetMatch && bStreetMatch) {
                        const aFirstWord = aStreetWords[0].startsWith(value);
                        const bFirstWord = bStreetWords[0].startsWith(value);
                        if (aFirstWord && !bFirstWord) return -1;
                        if (!aFirstWord && bFirstWord) return 1;
                    }
                }
                return a.street.localeCompare(b.street);
            });
            
            if (addresses.length === 0 || value === '') {
                dropdown.classList.remove('active');
                return;
            }
            
            dropdown.innerHTML = addresses.slice(0, 5).map(a => `
                <div class="autocomplete-item" onclick="selectAddressForGroup(${groupIndex}, ${a.id}, '${a.street.replace(/'/g, "\\'")}')">
                    ${a.street}, ${a.suburb}${a.propertyNumber ? ' - ' + a.propertyNumber : ''}
                </div>
            `).join('');
            
            dropdown.classList.add('active');
        }

        function saveAddress() {
            const street = document.getElementById('new-address-street').value;
            const suburb = document.getElementById('new-address-suburb').value;
            const propertyNumber = document.getElementById('new-address-prop').value;
            
            if (!street || !suburb) {
                showToast('Please fill in all required fields', true);
                return;
            }

            db.addAddress({ street, suburb, propertyNumber });
            closeModal('add-address-modal');
            showToast('Address added successfully');
            render();
        }

        function confirmDeleteAddress() {
            const id = parseInt(document.getElementById('delete-address-select').value);
            if (!id) return;

            const result = db.deleteAddress(id);
            if (result.success) {
                closeModal('delete-address-modal');
                showToast('Address deleted successfully');
                render();
            } else {
                showToast(result.message, true);
            }
        }

        function saveTrade() {
            const name = document.getElementById('new-trade-name').value;
            if (!name) {
                showToast('Please enter a trade name', true);
                return;
            }

            db.addTrade({ name });
            closeModal('add-trade-modal');
            showToast('Trade added successfully');
            render();
        }

        function confirmDeleteTrade() {
            const id = parseInt(document.getElementById('delete-trade-select').value);
            if (!id) return;

            const result = db.deleteTrade(id);
            if (result.success) {
                closeModal('delete-trade-modal');
                showToast('Trade deleted successfully');
                render();
            } else {
                showToast(result.message, true);
            }
        }

        function saveContractor() {
            const name = document.getElementById('new-contractor-name').value.trim();
            const email = document.getElementById('new-contractor-email').value.trim();
            const phone = document.getElementById('new-contractor-phone').value.trim();
            const checkedBoxes = document.querySelectorAll('.trade-checkbox:checked');
            const tradeIds = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
            
            if (!name) {
                showToast('Please enter contractor name', true);
                return;
            }

            if (tradeIds.length === 0) {
                // Allow saving without trades, but warn user
                if (!confirm('No trades selected. Continue anyway?')) {
                    return;
                }
            }

        function applyBulkTradeAssignment() {
            // Get selected contractors
            const contractorCheckboxes = document.querySelectorAll('[id^="bulk-contractor-"]:checked');
            const selectedContractorIds = Array.from(contractorCheckboxes).map(cb => parseInt(cb.value));

            // Get selected trades
            const tradeCheckboxes = document.querySelectorAll('[id^="bulk-trade-"]:checked');
            const selectedTradeIds = Array.from(tradeCheckboxes).map(cb => parseInt(cb.value));

            if (selectedContractorIds.length === 0) {
                showToast('Please select at least one contractor', true);
                return;
            }

            if (selectedTradeIds.length === 0) {
                showToast('Please select at least one trade', true);
                return;
            }

            // Apply trades to contractors
            let updatedCount = 0;
            selectedContractorIds.forEach(contractorId => {
                const contractor = db.getContractor(contractorId);
                if (contractor) {
                    // Merge new trades with existing ones (no duplicates)
                    const existingTradeIds = contractor.tradeIds || [];
                    const mergedTradeIds = [...new Set([...existingTradeIds, ...selectedTradeIds])];
                    
                    // Update contractor
                    contractor.tradeIds = mergedTradeIds;
                    
                    // Build trades string
                    const trades = db.getTrades()
                        .filter(t => mergedTradeIds.includes(t.id))
                        .map(t => t.name)
                        .join(', ');
                    contractor.trades = trades;
                    
                    updatedCount++;
                }
            });

            // Save to database
            db.save();

            closeModal('bulk-assign-trades-modal');
            showToast(`✓ Assigned trades to ${updatedCount} contractor(s)`);
            render();
        }

        function exportAllData() {
            const data = db.data;
            const timestamp = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
            const filename = `DefectTracker_Backup_${timestamp}.json`;
            
            const jsonString = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast(`Backup saved as ${filename}`);
        }

        function handleBackupImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    // Validate data structure
                    if (!data.addresses || !data.contractors || !data.trades || !data.defects) {
                        showToast('Invalid backup file format', true);
                        return;
                    }
                    
                    // Confirm before importing
                    if (!confirm(`Import backup? This will replace all current data.\n\nBackup contains:\n- ${data.addresses.length} addresses\n- ${data.contractors.length} contractors\n- ${data.trades.length} trades\n- ${data.defects.length} defects`)) {
                        return;
                    }
                    
                    // Import the data
                    localStorage.setItem('defectTrackerDB', JSON.stringify(data));
                    
                    showToast('Backup imported successfully! Reloading...');
                    
                    setTimeout(() => {
                        location.reload();
                    }, 1000);
                    
                } catch (err) {
                    showToast('Failed to import backup: Invalid JSON file', true);
                    console.error(err);
                }
                
                // Reset file input
                event.target.value = '';
            };
            
            reader.readAsText(file);
        }

        // Decide between AI extraction and the built-in parser, then review.
        async function extractAndReview(rawText, sourceName, reportType, useAI) {

        // ---- Text extraction ----
        let _pdfjsReady = null;
        function ensurePdfJs() {
            if (window.pdfjsLib) return Promise.resolve();
            if (_pdfjsReady) return _pdfjsReady;
            _pdfjsReady = new Promise((res, rej) => {
                const s = document.createElement('script');
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                s.onload = () => {
                    try { window.pdfjsLib.GlobalWorkerOptions.workerSrc =
                        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; } catch (e) {}
                    res();
                };
                s.onerror = () => rej(new Error('Could not load the PDF reader'));
                document.head.appendChild(s);
            });
            return _pdfjsReady;
        }
        async function extractReportText(file) {
            const name = (file.name || '').toLowerCase();
            if (name.endsWith('.pdf') || file.type === 'application/pdf') {
                await ensurePdfJs();
                const buf = await file.arrayBuffer();
                const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
                let text = '';
                for (let p = 1; p <= pdf.numPages; p++) {
                    const page = await pdf.getPage(p);
                    const content = await page.getTextContent();
                    let lastY = null, line = '', out = [];
                    for (const it of content.items) {
                        const y = it.transform[5];
                        if (lastY !== null && Math.abs(y - lastY) > 3) { out.push(line); line = ''; }
                        line += (line && !line.endsWith(' ') ? ' ' : '') + it.str;
                        lastY = y;
                    }
                    if (line) out.push(line);
                    text += out.join('\n') + '\n';
                }
                return text;
            }
            return await file.text();
        }

        // ---- Heuristic parser: text -> defect line items ----
        function parseReportDefects(text) {
            if (!text) return [];
            const clean = (s) => (s || '').replace(/\s+/g, ' ').trim();
            const looksLikeDefect = (s) => s && s.length >= 4 && s.length <= 300
                && /[a-zA-Z]/.test(s) && !/^\d+$/.test(s) && !/^page\s+\d+/i.test(s);
            const bulletRe = /^\s*(?:[-*•·▪◦‣]|\(?\d+[\.\):]|\(?[a-zA-Z][\.\)])\s+/;
            const lines = text.replace(/\r/g, '').split('\n');
            const items = [];
            let buf = '';
            const flush = () => { const s = clean(buf); if (looksLikeDefect(s)) items.push(s); buf = ''; };
            for (const raw of lines) {
                const line = raw.trim();
                if (!line) { flush(); continue; }
                if (bulletRe.test(raw)) { flush(); buf = line.replace(bulletRe, ''); }
                else if (buf) { buf += ' ' + line; }
                else { buf = line; }
            }
            flush();
            // Fallback: if almost nothing detected, split into sentences
            if (items.length < 2) {
                const sentences = clean(text).split(/(?<=[.;])\s+/).map(clean).filter(looksLikeDefect);
                if (sentences.length > items.length) return dedupe(sentences);
            }
            return dedupe(items);
            function dedupe(arr) { const seen = new Set(); return arr.filter(x => { const k = x.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true; }); }
        }

        // ---- Step 2: review & assign each item ----
        let _review = null;
        function startReportReview(items, reportName, reportType) {
            _review = { items, index: 0, saved: 0, reportName, reportType: reportType || 'BPI', lastAddressId: null };
            renderReviewItem();

        function renderReviewItem() {
            const r = _review;
            if (r.index >= r.items.length) return finishReview();
            const addrOpts = db.getAddresses().slice().sort((a, b) => (a.street || '').localeCompare(b.street || ''))
                .map(a => `<option value="${a.id}" ${a.id === r.lastAddressId ? 'selected' : ''}>${formatAddress(a)}</option>`).join('');
            const contrOpts = db.getContractors().slice().sort((a, b) => (a.name || '').localeCompare(b.name || ''))
                .map(c => `<option value="${c.id}">${c.name}${c.trades && c.trades !== 'No Trade Assigned' ? ' — ' + c.trades.split(',')[0] : ''}</option>`).join('');
            const pct = Math.round((r.index / r.items.length) * 100);
            impOverlay(`
                <div id="imp-head"><strong>Review defect ${r.index + 1} of ${r.items.length}</strong><button id="imp-close">✕</button></div>
                <div id="imp-body">
                    <div class="imp-progress">${r.saved} saved · ${r.items.length - r.index} to review</div>

                    <button class="imp-btn secondary" id="rv-finish" style="margin-top:10px">Finish &amp; close</button>
                </div>`);
            document.getElementById('rv-skip').onclick = () => { r.index++; renderReviewItem(); };
            document.getElementById('rv-finish').onclick = finishReview;

                db.addDefect({ addressId, contractorId, description: desc, status: 'open', unassigned: false });
                r.lastAddressId = addressId;
                r.saved++; r.index++;
                renderReviewItem();
            };
        }
        async function finishReview() {

        function reportFilteredDefects(o) {
            let list = db.data.defects.slice();
            if (o.addressId) list = list.filter(d => d.addressId === o.addressId);
            if (o.contractorId) list = list.filter(d => d.contractorId === o.contractorId);
            if (o.tradeId) list = list.filter(d => { const c = db.getContractor(d.contractorId); return c && (c.tradeIds || []).includes(o.tradeId); });
            if (o.status && o.status !== 'all') list = list.filter(d => defectStatusOf(d) === o.status);
            if (o.from) list = list.filter(d => d.createdAt && d.createdAt.slice(0, 10) >= o.from);
            if (o.to) list = list.filter(d => d.createdAt && d.createdAt.slice(0, 10) <= o.to);
            return list;
        }

        async function runReportBuilder() {
            const o = {
                status: document.getElementById('rb-status').value,
                addressId: parseInt(document.getElementById('rb-address').value) || null,
                contractorId: parseInt(document.getElementById('rb-contractor').value) || null,
                tradeId: parseInt(document.getElementById('rb-trade').value) || null,
                from: document.getElementById('rb-from').value || null,
                to: document.getElementById('rb-to').value || null,
                photos: document.getElementById('rb-photos').checked
            };
            const list = reportFilteredDefects(o);
            if (!list.length) { showToast('No defects match those filters', true); return; }
            impSetBusy('Generating PDF… (' + list.length + ' defect' + (list.length > 1 ? 's' : '') + ')' + (o.photos ? ' with photos' : ''));
            try { await generateDefectPDF(list, o); impClose(); showToast('PDF report downloaded'); }
            catch (e) { console.error(e); impOverlayMessage('Could not generate PDF: ' + (e.message || e)); }
        }

        async function generateDefectPDF(list, opts) {
            await ensureJsPdf();
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4' });
            const pageW = 210, pageH = 297, M = 14, contentW = pageW - 2 * M, descX = M + 26;
            const dateStr = new Date().toISOString().slice(0, 10);
            let y = M + 2;

            doc.setFont('helvetica', 'bold'); doc.setFontSize(18); doc.setTextColor(20, 24, 40);
            doc.text('Defect Report', M, y + 4); y += 11;

            const parts = [];
            if (opts.status && opts.status !== 'all') parts.push('Status: ' + opts.status);
            if (opts.addressId) parts.push('Address: ' + formatAddress(db.getAddress(opts.addressId)));
            if (opts.contractorId) { const c = db.getContractor(opts.contractorId); parts.push('Contractor: ' + (c ? c.name : '')); }
            if (opts.tradeId) { const t = db.data.trades.find(x => x.id === opts.tradeId); parts.push('Trade: ' + (t ? t.name : '')); }
            if (opts.from || opts.to) parts.push('Dates: ' + (opts.from || '…') + ' → ' + (opts.to || '…'));
            doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(120, 128, 140);
            doc.text('Generated ' + dateStr + (parts.length ? '   ·   ' + parts.join('   ·   ') : ''), M, y);
            doc.text(list.length + ' defect(s)', M, y + 5); y += 9;
            doc.setDrawColor(225, 228, 235); doc.line(M, y, pageW - M, y); y += 7;

            const groups = {};
            list.forEach(d => { const a = db.getAddress(d.addressId); const k = a ? formatAddress(a) : '(no address)'; (groups[k] = groups[k] || []).push(d); });
            const statusColor = { open: [239, 68, 68], pending: [245, 158, 11], completed: [34, 197, 94] };
            const ensureSpace = (h) => { if (y + h > pageH - M) { doc.addPage(); y = M; } };

            let itemNo = 0;
            const bookingDates = new Set();
            for (const gk of Object.keys(groups).sort()) {
                ensureSpace(12);
                doc.setFont('helvetica', 'bold'); doc.setFontSize(12); doc.setTextColor(20, 24, 40);
                doc.text(gk, M, y); y += 6;
                for (const d of groups[gk]) {
                    itemNo++;
                    const st = defectStatusOf(d);
                    const c = db.getContractor(d.contractorId);
                    doc.setFont('helvetica', 'normal'); doc.setFontSize(11);
                    const descLines = doc.splitTextToSize('Item ' + itemNo + '.  ' + (d.location ? d.location + ' - ' : '') + (d.description || '(no description)'), contentW - 26);
                    let imgs = [];
                    if (opts.photos && window.CloudPhotos) { try { imgs = await window.CloudPhotos.getForPdf(d.id); } catch (e) {} }
                    const photoH = imgs.length ? 32 : 0;
                    const blockH = Math.max(6, descLines.length * 4.7) + 5 + photoH + 5;
                    ensureSpace(blockH);

                    const col = statusColor[st] || [120, 120, 120];
                    doc.setFillColor(col[0], col[1], col[2]);
                    doc.roundedRect(M, y - 3.4, 22, 5.4, 1.5, 1.5, 'F');
                    doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); doc.setTextColor(255, 255, 255);
                    doc.text(st.toUpperCase(), M + 11, y, { align: 'center' });

                    doc.setFont('helvetica', 'normal'); doc.setFontSize(11); doc.setTextColor(20, 24, 40);
                    doc.text(descLines, descX, y);
                    y += Math.max(5, descLines.length * 4.7);

                    doc.setFontSize(9); doc.setTextColor(120, 128, 140);
                    if (d.bookingAt) bookingDates.add(fmtDateNice(d.bookingAt));
                    const meta = [c ? ('Contractor: ' + c.name) : 'Unassigned', (c && c.email) ? c.email : '',
                                  d.bookingAt ? ('Attend: ' + fmtDateNice(d.bookingAt)) : ''].filter(Boolean).join('    ');
                    doc.text(meta, descX, y); y += 4;

                    if (imgs.length) {
                        let px = descX;
                        for (const im of imgs) {
                            const w = 28, h = im.w ? Math.min(30, w * (im.h / im.w)) : 22;
                            try { doc.addImage(im.dataUrl, 'JPEG', px, y, w, h); } catch (e) {}
                            px += w + 4;
                        }
                        y += photoH;
                    }
                    y += 4;
                    doc.setDrawColor(238, 240, 244); doc.line(descX, y - 2, pageW - M, y - 2);
                }
                y += 4;
            }
            if (bookingDates.size) {
                ensureSpace(12);
                const note = bookingDates.size === 1
                    ? 'Please confirm booking date of ' + [...bookingDates][0] + '.'
                    : 'Please confirm the booking dates noted above.';
                doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(20, 24, 40);
                doc.text(note, M, y + 2);
            }
            doc.save('Defect-Report-' + dateStr + '.pdf');
        }
