                if (reportType === 'BPI') {
                    const items = parseBpiDefects(text);
                    if (!items.length) { impOverlayMessage('No defects were found in that text.'); return; }
                    startReportReview(items, 'Pasted report', reportType, matchAddressFromText(text));
                    return;
                }
                await extractAndReview(text, 'Pasted report', reportType, useAI);
            };
        }

        // Decide between AI extraction and the built-in parser, then review.
        async function extractAndReview(rawText, sourceName, reportType, useAI) {
            let items = [];
            if (useAI) {
                impSetBusy('🤖 Reading the report with AI…');
                try {
                    items = await window.CloudAI.extract(rawText);
                } catch (err) {
                    console.error('[AI extract]', err);
                    showToast('AI extraction failed — using basic parser', true);
                    items = parseReportDefects(rawText);
                }
            } else {
                items = parseReportDefects(rawText);
            }
            if (!items.length) { impOverlayMessage('No defects were found in that report.'); return; }
            // Match the property from the report header even on the AI path, so the
            // address is pre-selected regardless of which extractor ran. The source
            // file name doubles as a match input (BPI names embed lot + street).
            startReportReview(items, sourceName, reportType, matchAddressFromText(rawText, sourceName));
        }

        function impSetBusy(msg) {
            const body = document.getElementById('imp-body');
            if (body) body.innerHTML = `<div style="padding:30px;text-align:center;color:var(--text-secondary,#888)">${msg}</div>`;
        }
        function impOverlayMessage(msg) {
            const body = document.getElementById('imp-body');
            if (body) body.innerHTML = `<div style="padding:24px;text-align:center">${msg}</div>
                <button class="imp-btn secondary" onclick="openReportImport()">Try again</button>`;
        }

        // ---- Text extraction ----
        let _pdfjsReady = null;
        function ensurePdfJs() {
            if (window.pdfjsLib) return Promise.resolve();
            if (_pdfjsReady) return _pdfjsReady;
            _pdfjsReady = new Promise((res, rej) => {
                const s = document.createElement('script');
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                s.onload = () => {
                    try { window.pdfjsLib.GlobalWorkerOptions.workerSrc =
                        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; } catch (e) {}
                    res();
                };
                s.onerror = () => rej(new Error('Could not load the PDF reader'));
                document.head.appendChild(s);
            });
            return _pdfjsReady;
        }
        async function extractReportText(file) {
            const name = (file.name || '').toLowerCase();
            if (name.endsWith('.pdf') || file.type === 'application/pdf') {
                await ensurePdfJs();
                const buf = await file.arrayBuffer();
                const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
                let text = '';
                for (let p = 1; p <= pdf.numPages; p++) {
                    const page = await pdf.getPage(p);
                    const content = await page.getTextContent();
                    let lastY = null, line = '', out = [];
                    for (const it of content.items) {
                        const y = it.transform[5];
                        if (lastY !== null && Math.abs(y - lastY) > 3) { out.push(line); line = ''; }
                        line += (line && !line.endsWith(' ') ? ' ' : '') + it.str;
                        lastY = y;
                    }
                    if (line) out.push(line);
                    text += out.join('\n') + '\n';
                }
                return text;
            }
            return await file.text();
        }

        // ---- Heuristic parser: text -> defect line items ----
        function parseReportDefects(text) {
            if (!text) return [];
            const clean = (s) => (s || '').replace(/\s+/g, ' ').trim();
            const looksLikeDefect = (s) => s && s.length >= 4 && s.length <= 300
                && /[a-zA-Z]/.test(s) && !/^\d+$/.test(s) && !/^page\s+\d+/i.test(s);
            const bulletRe = /^\s*(?:[-*•·▪◦‣]|\(?\d+[\.\):]|\(?[a-zA-Z][\.\)])\s+/;
            const lines = text.replace(/\r/g, '').split('\n');
            const items = [];
            let buf = '';
            const flush = () => { const s = clean(buf); if (looksLikeDefect(s)) items.push(s); buf = ''; };
            for (const raw of lines) {
                const line = raw.trim();
                if (!line) { flush(); continue; }
                if (bulletRe.test(raw)) { flush(); buf = line.replace(bulletRe, ''); }
                else if (buf) { buf += ' ' + line; }
                else { buf = line; }
            }
            flush();
            // Fallback: if almost nothing detected, split into sentences
            if (items.length < 2) {
                const sentences = clean(text).split(/(?<=[.;])\s+/).map(clean).filter(looksLikeDefect);
                if (sentences.length > items.length) return dedupe(sentences);
            }
            return dedupe(items);
            function dedupe(arr) { const seen = new Set(); return arr.filter(x => { const k = x.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true; }); }
        }

        // ===========================================================================
        //  BPI360 smart import — structured defects (location, page, trade) so the
        //  supervisor reviews + allocates instead of typing. (Spiro 2026-06-09)
        // ===========================================================================
        // Trade inference learned from the defect language in BPI final reports.
        const BPI_TRADE_RULES = [
            ['Painter',      /\bpaint|repaint|raw timber|hinge knuckle|touch ?up|overspray|paint runs?\b/i],
            ['Renderer',     /\brender|acrylic render/i],
            ['Bricklayer',   /\bbrick|mortar|mortal|perpend|\bpier\b|weep ?hole|articulation joint|lintel/i],
            ['Plasterer',    /\bcornice|plaster|nail pop|patch (hole|the)|crack(ing|ed)? to (wall|ceiling)|set joint|sheet join|\bdip\b|bulkhead/i],
            ['Electrician',  /\bexhaust fan|light switch|power ?point|\bgpo\b|down ?light|wiring|switchboard|\btimer\b|sensor|smoke alarm|data point|\blight\b/i],
            ['Roof Plumber', /\bdownpipe|fascia|barge|gutter|fc sheet|\broof|flashing|ridge|valley/i],
            ['Plumber',      /\btap\b|basin|sink|toilet|\bwc\b|drain|waste|plumb|trough|grommet|\bmixer\b|spout|cistern|hand ?held shower|shower bracket|overflow pipe|\briser|storm ?water|grate cover|pipe penetration|no water to|garden tap/i],
            ['Tiler',        /\btile|grout|tiling/i],
            ['Waterproofer', /\bwaterproof|shower (base|fall)|puddle flange/i],
            ['Flooring',     /\bcarpet|spikes (can be )?felt|floating floor|laminate floor|vinyl plank/i],
            ['Carpenter',    /\bgripper catch|margin|architrave|skirting|\bdoor|\bgate|cabinet|cupboard|hinge|latch|handle|shelf|robe|\block\b|towel rail|towel ring|\bquads?\b|drawer|\bdraw\b|slider|flooring|manhole|screw cap|twisted|cushion stop|porch post|\bbolts?\b|chipped|vanity/i],
            ['Glazier',      /\bglass|glazing|window|mirror|shower screen/i],
            ['Concreter',    /\bdriveway|concrete|\bslab|\bpath\b|crossover/i],
            ['Caulker',      /\bcaulk|silicone|seal gap|sealant|gap between|bath hob/i],
            ['Cleaner',      /\bclean|builders'? material|debris|residue|rubbish/i],
        ];
        function classifyBpiTrade(text) {
            for (const [trade, re] of BPI_TRADE_RULES) if (re.test(text)) return trade;
            return '';
        }
        // Trade label → keywords to find a matching contractor (by its trades/name).
        const BPI_TRADE_KEYWORDS = {
            Painter:['paint'], Renderer:['render','acrylic'], Bricklayer:['brick','mason'], Plasterer:['plaster','cornice','gyprock'],
            Electrician:['electric','elec'], 'Roof Plumber':['roof','gutter','plumb'], Plumber:['plumb'],
            Tiler:['tile','tiling'], Waterproofer:['waterproof'], Flooring:['floor','carpet','vinyl','laminate'],
            Carpenter:['carpen','fixing','door','cabinet','joinery','lock'],
            Glazier:['glaz','glass','window'], Concreter:['concret'], Caulker:['caulk','silicone','seal'], Cleaner:['clean'],
            Insulation:['insulat','sisal','sarking','wrap','foil'],
        };
        function suggestContractorForTrade(trade) {
            const kws = BPI_TRADE_KEYWORDS[trade]; if (!kws) return null;
            const hit = db.getContractors().find(c => {
                const hay = ((c.trades || '') + ' ' + (c.name || '')).toLowerCase();
                return kws.some(k => hay.includes(k));
            });
            return hit ? hit.id : null;
        }
        // ── Framework call-up: who was actually engaged for a trade on THIS job ──
        // The Order Profile (uploaded in CH Tracker, exposed via CloudCallups)
        // lists, per job, the supplier engaged for each cost centre. We match
        // those supplier names to our contractor list and, for a given BPI trade,
        // pick the engaged contractor whose trades best fit — so the suggestion is
        // the real sub on this job, not a global keyword guess.
        function normCompanyName(s) {
            return String(s || '').toLowerCase()
                .replace(/\bt\/a\b.*$/, '')                                  // drop "t/a Trading Name" tails
                .replace(/\bpty\b|\bltd\b|\bp\/l\b|\bpl\b|\binc\b|\bco\b/g, '')
                .replace(/[^a-z0-9 ]/g, ' ')
                .replace(/\s+/g, ' ').trim();
        }
        // Bulk material suppliers / retailers. They appear as real call-up rows but
        // never rectify a defect, and their broad material catalogues keyword-match
        // many trades (e.g. Bunnings → "Carpenter") — so exclude them from
        // contractor suggestions. Extend freely; matched on the normalised name.
        const CALLUP_MATERIAL_SUPPLIERS = new Set([
            'bunnings', 'bunnings frame truss order', 'bunnings timber hardware',
            'bowens', 'bowens timber hardware', 'dahlsens', 'dahlsens building centres',
            'austral bricks', 'boral', 'boral csr bricks', 'beaumont tiles',
            'e s trading', 'e s trading discounts', 'corinthian', 'corinthian industries australia',
            'dabsand dabaco sand supply', 'css victoria the trustee for css victoria'
        ].map(normCompanyName));
        // Contractors engaged on this job (call-up supplier_name → our contractor).
        function callupContractorsForAddress(addressLid) {
            if (addressLid == null || !window.CloudCallups) return [];
            const rows = window.CloudCallups.rowsForAddress(addressLid) || [];
            if (!rows.length) return [];
            const contractors = db.getContractors();
            const byNorm = new Map();
            contractors.forEach(c => { const n = normCompanyName(c.name); if (n) byNorm.set(n, c); });
            const out = [], seen = new Set();
            for (const r of rows) {
                const n = normCompanyName(r.supplier_name || '');
                if (!n || n === 'supervisor to select') continue;            // placeholder, not a real sub
                let c = byNorm.get(n);
                if (!c) c = contractors.find(x => { const cn = normCompanyName(x.name); return cn && (cn.includes(n) || n.includes(cn)); });
                if (!c || seen.has(c.id)) continue;
                if (CALLUP_MATERIAL_SUPPLIERS.has(normCompanyName(c.name))) continue;   // supplier, not a rectifier
                seen.add(c.id); out.push({ contractor: c, costCentre: r.cost_centre || '' });
            }
            return out;
        }
        // Trade → tokens that appear in our contractors' structured CH trade
        // names. Deliberately tighter than the text classifier's keywords: matched
        // against the trade vocabulary, not loose English, so a window sub won't
        // catch a "Carpenter" defect on the word "door", nor a roofer steal a
        // "Tiler" on "Roof Tiles". Scoring breaks ties (roofer beats plumber on a
        // gutter defect via 'roof'+'gutter').
        const CALLUP_TRADE_KEYWORDS = {
            Painter: ['painter', 'painting'],
            Renderer: ['render'],
            Bricklayer: ['bricklayer', 'brick lay'],
            Plasterer: ['plaster', 'cornice'],
            Electrician: ['electrical', 'electrician'],
            'Roof Plumber': ['roof', 'gutter', 'fascia', 'flashing', 'capping'],
            Plumber: ['plumber', 'plumbing'],
            Tiler: ['floor tile', 'wall tile', 'tiles labour', 'tiling'],
            Waterproofer: ['waterproof'],
            Flooring: ['carpet', 'floor covering', 'vinyl', 'laminate', 'timber floor'],
            Carpenter: ['carpenter', 'carpentry'],
            Glazier: ['window', 'entry frame', 'glazing', 'glazier'],
            Concreter: ['concrete', 'concretor'],
            Caulker: ['caulk', 'joint sealing'],
            Cleaner: ['cleaner', 'cleaning'],
            Insulation: ['insulation', 'sisalation', 'sarking', 'wall wrap', 'foil'],
        };
        // Suggest the called-up contractor for `trade` on the job at `addressLid`.
        // Returns null when the job has no profile or no engaged sub fits the trade
        // (a clean miss → caller falls back to learned history / the static rule).
        function suggestCallupForTrade(trade, addressLid) {
            const kws = CALLUP_TRADE_KEYWORDS[trade]; if (!kws) return null;
            const engaged = callupContractorsForAddress(addressLid);
            if (!engaged.length) return null;
            let best = null, bestScore = 0;
            for (const e of engaged) {
                const hay = ((e.contractor.trades || '') + ' ' + (e.contractor.name || '')).toLowerCase();
                const score = kws.reduce((n, k) => n + (hay.includes(k) ? 1 : 0), 0);
                if (score > bestScore) { bestScore = score; best = e; }
            }
            return best ? { contractorId: best.contractor.id, costCentre: best.costCentre } : null;
        }
        // ════════ Trade learning (hybrid): server-learned → curated rule → keyword ════════
        // Normalise a defect line to a stable phrase key: lowercase, strip rooms,
        // digits and filler, so the same templated BPI observation collapses to one
        // key regardless of room/quantity. This key drives the shared learning table.
        const PHRASE_ROOM_WORDS = ['master bedroom','powder room','walk in robe','linen cupboard','butlers pantry','bedroom','ensuite','bathroom','laundry','kitchen','hallway','pantry','alfresco','balcony','porch','study','rumpus','meals','living','family','garage','wir','robe'];
        const PHRASE_STOPWORDS = new Set(['to','the','of','at','an','and','is','are','be','please','required','reqd','req','need','needs','needed','provide','rectify','repair','fix','check','ensure','as','per','area','areas','no','with','for','from','has','have','around','where','there','here','this','that','all','each','both','left','right','front','rear','side']);
        function normalizePhrase(text) {
            let s = ' ' + String(text || '').toLowerCase() + ' ';
            for (const rm of PHRASE_ROOM_WORDS) s = s.split(rm).join(' ');
            s = s.replace(/[^a-z ]+/g, ' ');
            const toks = s.split(/\s+/).filter(w => w.length > 1 && !PHRASE_STOPWORDS.has(w));
            return toks.join(' ').trim();
        }
        // Curated CH trade conventions — the known classifier traps (sealing around
        // doors/trim is the PAINTER's gap-fill here, not the caulker, etc). Tested
        // against the lowercased defect text; first match wins. Extend freely.
        const CURATED_TRADE_OVERRIDES = [
            // Insulation / wall-wrap (sisalation, sarking) — must beat the "roof"
            // keyword, since these defects mention "roof members"/"ceiling".
            { re: /\b(insulation|sisalation|sisal|sarking|wall ?wrap|foilboard|foil board|reflective foil|sarked|batts?)\b/, trade: 'Insulation' },
            { re: /\bseal(ing|ant)?\b[^.]*\b(door|window|frame|architrave|skirt|cornice|reveal|jamb|trim)/, trade: 'Painter' },
            { re: /\b(gap|crack)s?\b[^.]*\b(door|window|architrave|skirt|cornice|trim|wall|ceiling|frame)/, trade: 'Painter' },
            { re: /\b(touch ?up|repaint|undercoat|overspray|paint (run|drip|finish|coverage|mark))\b/, trade: 'Painter' },
            { re: /\b(silicone|caulk)[^.]*\b(shower|bath|basin|vanity|sink|splashback|wet area|tile)/, trade: 'Caulker' },
            { re: /\b(re-?grout|grout)\b/, trade: 'Tiler' },
            { re: /\b(tile|tiling)\b[^.]*\b(loose|drummy|crack|chip|lippage|missing)/, trade: 'Tiler' },
            { re: /\bwaterproof/, trade: 'Waterproofer' },
            { re: /\b(door (handle|lock|hinge|latch|catch|stop)|striker plate|deadlock)\b/, trade: 'Carpenter' },
            { re: /\b(light|down ?light|power ?point|gpo|switch|switchboard|exhaust fan|smoke alarm|globe|wiring)\b/, trade: 'Electrician' },
            { re: /\b(tap|mixer|toilet|cistern|basin waste|drainage|down ?pipe|water hammer)\b/, trade: 'Plumber' },
        ];
        // The trade for a defect line: shared learning (confident) wins, then a
        // curated rule, then the keyword classifier. Returns the source for display.
        function resolveTrade(text) {
            const phrase = normalizePhrase(text);
            if (window.CloudLearning) {
                const learned = window.CloudLearning.suggestTrade(phrase);
                if (learned && learned.trade) return { trade: learned.trade, source: 'learned', n: learned.n };
            }
            const low = String(text || '').toLowerCase();
            for (const o of CURATED_TRADE_OVERRIDES) if (o.re.test(low)) return { trade: o.trade, source: 'rule' };
            const t = classifyBpiTrade(low);
            return { trade: t || '', source: t ? 'keyword' : 'none' };
        }
        // Reverse map: which BPI trade does this chosen contractor represent? Lets us
        // learn (phrase → trade) from the contractor a supervisor actually assigns.
        function contractorToBpiTrade(contractor) {
            if (!contractor) return '';
            const hay = ((contractor.trades || '') + ' ' + (contractor.name || '')).toLowerCase();
            let best = '', bestScore = 0;
            for (const trade in CALLUP_TRADE_KEYWORDS) {
                const score = CALLUP_TRADE_KEYWORDS[trade].reduce((n, k) => n + (hay.includes(k) ? 1 : 0), 0);
                if (score > bestScore) { bestScore = score; best = trade; }
            }
            return best;
        }

        // ===========================================================================
        //  Report LEARNING — the import gets smarter from real assignment history.
        //  Instead of a separate corrections store, we learn straight from the
        //  defects the team has already assigned (synced in db.data.defects). Each
        //  past defect's wording → its contractor is a training example, so every
        //  correction a supervisor makes during review syncs and trains the next
        //  import for free. The static BPI_TRADE_RULES remain the cold-start prior.
        //  (Spiro 2026-06-09)
        // ===========================================================================
        const BPI_STOPWORDS = new Set(['the','and','for','with','this','that','from','have','has','are','was','were','not','but','all','any','out','off','too','its','their','there','then','than','been','being','onto','into','over','under','some','more','most','also','will','shall','must','need','needs','needed','please','area','areas','required','require','requires','left','right','front','rear','side','general','internal','external','elevation','room','wall','walls','ceiling','floor','floors','door','doors','window','windows','noted','observed','observation','defect','defects','item','items','various','multiple','number','section','sections','around','near','above','below','between','within','approx','approximately','refer','photo','photos','page','lot']);
        // Sub-4-char tokens that ARE meaningful in defect language — keep these
        // (longer domain words like "paint"/"grout"/"tile" pass the length test anyway).
        const BPI_KEEP_SHORT = new Set(['tap','gpo','wc','fan','fc','gap','dip']);
        function bpiTokens(text) {
            const out = new Set();
            (text || '').toLowerCase().split(/[^a-z]+/).forEach(w => {
                if (!w) return;
                if (BPI_STOPWORDS.has(w)) return;
                let t = w;
                if (t.length > 4 && t.endsWith('s')) t = t.slice(0, -1);   // light singularise
                if (t.length >= 4 || BPI_KEEP_SHORT.has(w) || BPI_KEEP_SHORT.has(t)) out.add(t);
            });
            return out;
        }
        // token -> Map(contractorId -> count), plus per-token totals. Rebuilt per
        // import (cheap), and nudged live as the supervisor saves so later items in
        // the SAME report benefit before the sync round-trip.
        let _bpiLearn = null;   // { byToken: Map, tokenTotal: Map, defectCount }
        function buildBpiLearning() {
            const byToken = new Map();   // token -> Map(contractorId -> count)
            const tokenTotal = new Map();
            const defects = (db.data && db.data.defects) || [];   // includes completed
            for (const d of defects) {
                if (d.contractorId == null) continue;
                addLearningExample(byToken, tokenTotal, (d.description || '') + ' ' + (d.location || ''), d.contractorId);
            }
            _bpiLearn = { byToken, tokenTotal, defectCount: defects.length };
        }
        function addLearningExample(byToken, tokenTotal, text, contractorId) {
            for (const tok of bpiTokens(text)) {
                let m = byToken.get(tok); if (!m) { m = new Map(); byToken.set(tok, m); }
                m.set(contractorId, (m.get(contractorId) || 0) + 1);
                tokenTotal.set(tok, (tokenTotal.get(tok) || 0) + 1);
            }
        }
        function ensureBpiLearning() {
            const n = ((db.data && db.data.defects) || []).length;
            if (!_bpiLearn || _bpiLearn.defectCount !== n) buildBpiLearning();
            return _bpiLearn;
        }
        // Record a fresh assignment immediately (incremental), without a full rebuild.
        function learnFromAssignment(text, contractorId) {
            if (contractorId == null) return;
            const L = ensureBpiLearning();
            addLearningExample(L.byToken, L.tokenTotal, text, contractorId);
            L.defectCount++;   // keep the cache key in step with the (soon-to-sync) defect
        }
        // Suggest a contractor from history. Naive-Bayes-ish: sum P(contractor|token)
        // over the input's tokens (ignoring one-off tokens as noise), pick the best,
        // and only fire when the evidence clears a confidence bar.
        function suggestFromHistory(text) {
            const L = ensureBpiLearning();
            if (!L.byToken.size) return null;
            const score = new Map();        // contractorId -> summed P(c|token)
            const support = new Map();      // contractorId -> # past defects backing it
            let contributing = 0;
            for (const tok of bpiTokens(text)) {
                const m = L.byToken.get(tok); if (!m) continue;
                const total = L.tokenTotal.get(tok) || 0;

                contributing++;

                    score.set(cid, (score.get(cid) || 0) + cnt / total);
                    support.set(cid, (support.get(cid) || 0) + cnt);
                }
            }
            if (!contributing) return null;
            let bestId = null, bestScore = 0;
            for (const [cid, s] of score) if (s > bestScore) { bestScore = s; bestId = cid; }
            if (bestId == null) return null;
            const confidence = bestScore / contributing;        // avg P across hit tokens
            if (confidence < 0.34 || bestScore < 0.6) return null;
            const contractor = db.getContractor(bestId);
            if (!contractor) return null;                         // assigned-then-deleted
            const trade = (contractor.trades && contractor.trades !== 'No Trade Assigned')
                ? contractor.trades.split(',')[0].trim() : '';
            return { contractorId: bestId, trade, support: support.get(bestId) || 0, confidence };
        }
        const BPI_LOCATIONS = ['Garage Internal PA Door','Garage External PA Door','General Internal','General External','Front Elevation','Left Elevation','Right Elevation','Rear Elevation','Master Bedroom','Bedroom 1','Bedroom 2','Bedroom 3','Bedroom 4','Bedroom 5','Powder Room','Linen Cupboard','Walk In Robe','Ensuite','Bathroom','Toilet','Laundry','Kitchen','Family','Meals','Living','Dining','Lounge','Rumpus','Theatre','Study','Sitting','Retreat','Hallway','Entry','Front Door','Stairs','Alfresco','Porch','Balcony','Pantry','Garage','Roof Space','Driveway','Roof'];
        function splitLocObs(rest) {
            const byGap = rest.split(/\s{3,}/);
            if (byGap.length >= 2 && byGap[0].trim().length <= 28) return { location: byGap[0].trim(), observation: byGap.slice(1).join(' ').trim() };
            // No column gap: peel a leading location. Numbered bedrooms first
            // (any number), then the LONGEST matching known room name so specific
            // labels (e.g. "Garage Internal PA Door") win over "Garage".
            const bm = rest.match(/^((?:Master\s+)?Bedroom(?:\s*\d+)?)\b\s*/i);
            if (bm) return { location: bm[1].replace(/\s+/g, ' ').trim(), observation: rest.slice(bm[0].length).trim() };

            const hit = BPI_LOCATIONS.slice().sort((a, b) => b.length - a.length).find(l => low.startsWith(l.toLowerCase()));

        // pdf.js text per page, with column gaps preserved (big x-jump → 3 spaces)
        // and page breaks (\f) so we can record each defect's page number.
        async function extractReportTextPaged(file) {
            await ensurePdfJs();
            const buf = await file.arrayBuffer();
            const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
            let text = '';
            for (let p = 1; p <= pdf.numPages; p++) {
                const page = await pdf.getPage(p);
                const content = await page.getTextContent();
                let lastY = null, lastEndX = null, line = '', out = [];
                for (const it of content.items) {
                    const x = it.transform[4], y = it.transform[5];
                    if (lastY !== null && Math.abs(y - lastY) > 3) { out.push(line); line = ''; lastEndX = null; }
                    if (line) line += (lastEndX !== null && (x - lastEndX) > 28) ? '   ' : (line.endsWith(' ') ? '' : ' ');
                    line += it.str;
                    lastY = y; lastEndX = x + (it.width || 0);
                }
                if (line) out.push(line);
                text += out.join('\n') + '\f';
            }
            return text;
        }
        // Parse the "Report With Supporting Photos" section into structured defects.
        function parseBpiDefects(pagedText) {
            const pages = (pagedText || '').split('\f');
            const raw = [];
            let inPhotos = false;
            pages.forEach((pageText, pi) => {
                const pageNo = pi + 1;
                if (/Report With Supporting Photos/i.test(pageText)) inPhotos = true;
                if (!inPhotos) return;
                let cur = null;
                for (const lineRaw of pageText.split('\n')) {
                    const line = lineRaw.replace(/\s+$/, '');
                    if (!line.trim()) continue;
                    if (/Email:|bookings@|www\.|Id\s+Location|Report With Supporting|^\s*Rectified\s*$/i.test(line)) continue;
                    const m = line.match(/^\s*(\d{1,3})\s+(.+)$/);
                    if (m) { if (cur) raw.push(cur); const s = splitLocObs(m[2]); cur = { id: +m[1], location: s.location, observation: s.observation, page: pageNo }; }
                    else if (cur) { cur.observation += ' ' + line.trim(); }
                }
                if (cur) raw.push(cur);
            });
            const seen = new Set(), items = [];
            for (const d of raw) {
                if (seen.has(d.id)) continue; seen.add(d.id);
                const obs = (d.observation || '').replace(/\s+/g, ' ').trim();
                if (!obs || obs.length < 3) continue;
                items.push({ description: obs, location: d.location || '', page: d.page, trade: classifyBpiTrade((d.location || '') + ' ' + obs) });
            }
            // Fallback to the generic parser if the structured pass found nothing.

        // Find the matching property from the report header "Lot N - Street Suburb"
        // and/or the PDF filename (BPI names embed lot + street, e.g.
        // "(1st_Inspection)_1403_20_Kobi_Street_Tarneit.pdf"), which survives even
        // when pdf.js fragments the extracted text.
        let _amftDbg = '';   // TEMP diagnostic, shown in the review meta line
        function matchAddressFromText(text, fileName) {
            const addrs = db.getAddresses();
            const norm = s => (s || '').toLowerCase().replace(/[_\-]+/g, ' ').replace(/\s+/g, ' ');
            const low = norm((fileName || '') + ' ' + (text || ''));
            const squish = low.replace(/[^a-z0-9]+/g, '');   // tolerant of "L ot 14 03"-style fragmentation
            let result = null, via = '';
            // 1) Explicit "Lot NNNN" anywhere (incl. fragmented).
            const lotM = low.match(/\blot\s*(\d+[a-z]?)\b/) || squish.match(/lot(\d{2,5}[a-z]?)/);
            if (lotM) {
                const lot = lotM[1];
                const hit = addrs.find(a => { const s = norm(a.street); return s.includes('lot ' + lot) || s.split(/[\s,()]+/).includes(lot); });
                if (hit) { result = hit.id; via = 'lot'; }
            }
            // 2) Score every address on its lot number / street name / house number
            //    appearing as tokens in filename+text — needs no "Lot" keyword at all.
            if (result == null) {
                const toks = new Set(low.split(/[^a-z0-9]+/).filter(Boolean));
                let best = null, ties = 0;
                for (const a of addrs) {
                    const s = norm(a.street);                                           // e.g. "lot 1403, (20) kobi st"
                    if (!s) continue;
                    const lotA = (s.match(/^lot\s*(\d+[a-z]?)\b/) || [])[1];            // "1403"
                    const rest = s.replace(/^lot\s*\w+,?\s*/, '').trim();               // "(20) kobi st"
                    const houseNum = (rest.match(/\d+/) || [])[0];                      // "20"
                    const nameTok = rest.replace(/^[()\d\s]+/, '').split(/\s+/)[0];     // "kobi"
                    let score = 0;
                    if (nameTok && nameTok.length >= 4 && (toks.has(nameTok) || squish.includes(nameTok))) score += 2;
                    if (lotA && (toks.has(lotA) || squish.includes('lot' + lotA))) score += 2;
                    if (houseNum && toks.has(houseNum)) score += 1;
                    if (score < 2) continue;
                    if (!best || score > best.score) { best = { id: a.id, score }; ties = 1; }
                    else if (score === best.score) ties++;
                }
                // A tie (e.g. 10 jobs on the same street, name-only match) is
                // ambiguous — leave unmatched rather than pick the wrong job.
                if (best && ties === 1) { result = best.id; via = 'score'; }
            }
            const matchedStreet = result != null ? ((db.getAddress(result) || {}).street || '?') : '—';
            _amftDbg = 'addrs=' + addrs.length + ' fn=' + (fileName ? 'Y' : 'N') + ' lot=' + (lotM ? lotM[1] : 'NONE') + ' match=' + (result != null ? (via + ':' + matchedStreet) : 'NULL');

            const contrRows = db.getContractors().slice().sort((a, b) => (a.name || '').localeCompare(b.name || ''))
                .map(c => `<label class="rb-opt" style="display:flex;align-items:center;gap:8px;padding:5px 6px;font-size:14px;cursor:pointer"><input type="checkbox" class="rb-contr" value="${c.id}" style="width:auto"> ${c.name}</label>`).join('');
            impOverlay(`
                <div id="imp-head"><strong>📑 Generate Report</strong><button id="imp-close">✕</button></div>
                <div id="imp-body">
                    <div class="imp-field"><label>Statuses to include</label>
                        <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:14px;padding:4px 0">
                            <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="rb-st-open" checked style="width:auto"> Open</label>
                            <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="rb-st-pending" style="width:auto"> Pending</label>
                            <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="rb-st-completed" style="width:auto"> Completed</label>
                        </div></div>
                    <div class="imp-field"><label>Addresses (optional — none ticked = any)</label>
                        <input type="text" id="rb-addr-search" placeholder="Search addresses…" oninput="rbFilterList('addr', this.value)" style="width:100%;margin-bottom:4px">
                        <div id="rb-addr-list" style="max-height:150px;overflow:auto;border:1px solid var(--brd,#ccc);border-radius:10px;padding:4px">${addrRows}</div></div>
                    <div class="imp-field"><label>Contractors (optional — none ticked = any)</label>
                        <input type="text" id="rb-contr-search" placeholder="Search contractors…" oninput="rbFilterList('contr', this.value)" style="width:100%;margin-bottom:4px">
                        <div id="rb-contr-list" style="max-height:150px;overflow:auto;border:1px solid var(--brd,#ccc);border-radius:10px;padding:4px">${contrRows}</div></div>
                    <!-- Trade filter hidden for now (Spiro 2026-06-09) — multi-contractor covers it -->

                    <div class="imp-row">
                        <div class="imp-field"><label>From date</label><input type="date" id="rb-from"></div>
                        <div class="imp-field"><label>To date</label><input type="date" id="rb-to"></div>
                    </div>
                    <label style="display:flex;align-items:center;gap:8px;font-size:14px;margin:6px 0 4px"><input type="checkbox" id="rb-photos" checked style="width:auto"> Include photos</label>
                    <button class="imp-btn" id="rb-go">Generate PDF →</button>
                </div>`);
            document.getElementById('rb-go').onclick = runReportBuilder;
        }

        // Live text filter for the report-builder checkbox lists (addr / contr).
        function rbFilterList(which, q) {
            q = (q || '').toLowerCase().trim();
            document.querySelectorAll('#rb-' + which + '-list .rb-opt').forEach(el => {
                el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }

        function reportFilteredDefects(o) {
            let list = db.data.defects.slice();
            if (o.addressIds && o.addressIds.length) list = list.filter(d => o.addressIds.includes(d.addressId));
            if (o.contractorIds && o.contractorIds.length) list = list.filter(d => o.contractorIds.includes(d.contractorId));
            if (o.tradeIds && o.tradeIds.length) list = list.filter(d => { const c = db.getContractor(d.contractorId); return c && (c.tradeIds || []).some(tid => o.tradeIds.includes(tid)); });
            if (o.statuses && o.statuses.length) list = list.filter(d => o.statuses.includes(defectStatusOf(d)));
            if (o.from) list = list.filter(d => d.createdAt && d.createdAt.slice(0, 10) >= o.from);
            if (o.to) list = list.filter(d => d.createdAt && d.createdAt.slice(0, 10) <= o.to);
            return list;
        }

        async function runReportBuilder() {
            const o = {
                statuses: ['open', 'pending', 'completed'].filter(s => document.getElementById('rb-st-' + s).checked),
                addressIds: Array.from(document.querySelectorAll('.rb-addr:checked')).map(x => parseInt(x.value)).filter(Boolean),
                contractorIds: Array.from(document.querySelectorAll('.rb-contr:checked')).map(x => parseInt(x.value)).filter(Boolean),
                from: document.getElementById('rb-from').value || null,
                to: document.getElementById('rb-to').value || null,
                photos: document.getElementById('rb-photos').checked
            };
            if (!o.statuses.length) { showToast('Tick at least one status to include', true); return; }
            const list = reportFilteredDefects(o);
            if (!list.length) { showToast('No defects match those filters', true); return; }
            impSetBusy('Generating PDF… (' + list.length + ' defect' + (list.length > 1 ? 's' : '') + ')' + (o.photos ? ' with photos' : ''));
            try { await generateDefectPDF(list, o); impClose(); showToast('PDF report downloaded'); }
            catch (e) { console.error(e); impOverlayMessage('Could not generate PDF: ' + (e.message || e)); }
        }

        async function generateDefectPDF(list, opts) {
            await ensureJsPdf();
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4' });
            const pageW = 210, pageH = 297, M = 14, contentW = pageW - 2 * M;
            const now = new Date();
            const dateStr = now.toISOString().slice(0, 10);
            const niceDate = now.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });

            // ── palette ──────────────────────────────────────────────
            const NAVY = [18, 33, 66], NAVY2 = [44, 84, 168];
            const INK = [28, 34, 50], MUTE = [122, 130, 144], LINE = [226, 230, 238];
            const statusColor = { open: [220, 38, 38], pending: [217, 119, 6], completed: [22, 163, 74] };
            const fill = (c) => doc.setFillColor(c[0], c[1], c[2]);
            const stroke = (c) => doc.setDrawColor(c[0], c[1], c[2]);
            const ink = (c) => doc.setTextColor(c[0], c[1], c[2]);

            // ── header band (page 1) ─────────────────────────────────
            fill(NAVY); doc.rect(0, 0, pageW, 34, 'F');
            fill(NAVY2); doc.rect(0, 34, pageW, 1.4, 'F');
            doc.setFont('helvetica', 'bold'); doc.setFontSize(22); ink([255, 255, 255]);
            doc.text('DEFECT REPORT', M, 16.5);
            doc.setFont('helvetica', 'normal'); doc.setFontSize(10); ink([186, 199, 224]);
            doc.text('SMV Defect Manager', M, 23.5);
            doc.setFontSize(9); ink([198, 209, 230]);
            doc.text(niceDate, pageW - M, 14, { align: 'right' });
            doc.setFont('helvetica', 'bold'); doc.setFontSize(12); ink([255, 255, 255]);
            doc.text(list.length + (list.length === 1 ? ' defect' : ' defects'), pageW - M, 22, { align: 'right' });

            let y = 44;

            // ── filter summary line ──────────────────────────────────
            const parts = [];
            if (opts.statuses && opts.statuses.length) parts.push('Status: ' + opts.statuses.join(', '));
            if (opts.addressIds && opts.addressIds.length) parts.push('Address: ' + opts.addressIds.map(id => formatAddress(db.getAddress(id))).join('; '));
            if (opts.contractorIds && opts.contractorIds.length) parts.push('Contractor: ' + opts.contractorIds.map(id => { const c = db.getContractor(id); return c ? c.name : ''; }).filter(Boolean).join('; '));
            if (opts.tradeIds && opts.tradeIds.length) parts.push('Trades: ' + opts.tradeIds.map(id => { const t = db.data.trades.find(x => x.id === id); return t ? t.name : ''; }).filter(Boolean).join(', '));
            if (opts.from || opts.to) parts.push('Dates: ' + (opts.from || '…') + ' → ' + (opts.to || '…'));
            if (parts.length) {
                doc.setFont('helvetica', 'normal'); doc.setFontSize(9); ink(MUTE);
                const ft = doc.splitTextToSize(parts.join('     ·     '), contentW);
                doc.text(ft, M, y); y += ft.length * 4 + 3;
            }

            // ── status summary pills ─────────────────────────────────
            const counts = { open: 0, pending: 0, completed: 0 };
            list.forEach(d => { const s = defectStatusOf(d); if (counts[s] != null) counts[s]++; });
            let px = M;
            [['open', 'OPEN'], ['pending', 'PENDING'], ['completed', 'COMPLETED']].forEach(([key, lbl]) => {
                const txt = counts[key] + '  ' + lbl;
                doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
                const w = doc.getTextWidth(txt) + 8;
                fill(statusColor[key]); doc.roundedRect(px, y, w, 6.5, 1.6, 1.6, 'F');
                ink([255, 255, 255]); doc.text(txt, px + 4, y + 4.4);
                px += w + 4;
            });
            y += 13;

            // ── group by address ─────────────────────────────────────
            const groups = {};
            list.forEach(d => { const a = db.getAddress(d.addressId); const k = a ? formatAddress(a) : '(no address)'; (groups[k] = groups[k] || []).push(d); });
            const ensureSpace = (h) => { if (y + h > pageH - 18) { doc.addPage(); y = M + 4; } };

            let itemNo = 0;
            const bookingDates = new Set();
            for (const gk of Object.keys(groups).sort()) {
                ensureSpace(16);
                // address section bar
                fill([241, 244, 250]); doc.roundedRect(M, y, contentW, 8.5, 1.6, 1.6, 'F');
                fill(NAVY); doc.rect(M, y, 1.8, 8.5, 'F');
                doc.setFont('helvetica', 'bold'); doc.setFontSize(11); ink(NAVY);
                doc.text(gk, M + 5, y + 5.7);
                doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); ink(MUTE);
                doc.text(groups[gk].length + (groups[gk].length === 1 ? ' item' : ' items'), pageW - M - 4, y + 5.7, { align: 'right' });
                y += 12;

                for (const d of groups[gk]) {
                    itemNo++;
                    const st = defectStatusOf(d);
                    const c = db.getContractor(d.contractorId);
                    const descTxt = (d.location ? d.location + ' — ' : '') + (d.description || '(no description)');
                    doc.setFontSize(10);
                    const descLines = doc.splitTextToSize(descTxt, contentW - 12);
                    let imgs = [];
                    if (opts.photos && window.CloudPhotos) { try { imgs = await window.CloudPhotos.getForPdf(d.id); } catch (e) {} }
                    const photoH = imgs.length ? 30 : 0;
                    if (d.bookingAt) bookingDates.add(fmtDateNice(d.bookingAt));
                    const meta = [c ? ('Contractor: ' + c.name) : 'Unassigned', (c && c.email) ? c.email : '', d.bookingAt ? ('Attend: ' + fmtDateNice(d.bookingAt)) : ''].filter(Boolean).join('     ·     ');
                    const cardH = 6 + descLines.length * 4.6 + 5 + (photoH ? photoH + 3 : 0) + 5;
                    ensureSpace(cardH + 3);

                    // card
                    fill([250, 251, 253]); stroke(LINE);
                    doc.roundedRect(M, y, contentW, cardH, 2, 2, 'FD');
                    const padX = M + 5;
                    let cy = y + 6.5;

                    // # number + status badge
                    doc.setFont('helvetica', 'bold'); doc.setFontSize(10); ink(INK);
                    doc.text('#' + itemNo, padX, cy);
                    const col = statusColor[st] || [120, 120, 120];
                    const blab = st.toUpperCase();
                    doc.setFontSize(7.5); const bw = doc.getTextWidth(blab) + 7;
                    fill(col); doc.roundedRect(pageW - M - 5 - bw, cy - 4, bw, 5.6, 1.4, 1.4, 'F');
                    ink([255, 255, 255]); doc.setFont('helvetica', 'bold');
                    doc.text(blab, pageW - M - 5 - bw / 2, cy - 0.2, { align: 'center' });
                    cy += 5.5;

                    // description
                    doc.setFont('helvetica', 'normal'); doc.setFontSize(10); ink(INK);
                    doc.text(descLines, padX, cy); cy += descLines.length * 4.6 + 1.5;

                    // meta
                    doc.setFontSize(8.5); ink(MUTE);
                    doc.text(meta, padX, cy); cy += 4;

                    // photos
                    if (imgs.length) {
                        let ix = padX;
                        for (const im of imgs) {
                            const w = 26, h = im.w ? Math.min(28, w * (im.h / im.w)) : 20;
                            try { doc.addImage(im.dataUrl, 'JPEG', ix, cy, w, h); } catch (e) {}
                            ix += w + 3;
                        }
                    }
                    y += cardH + 3;
                }
                y += 3;
            }

            // ── booking confirmation note ────────────────────────────
            if (bookingDates.size) {
                ensureSpace(14);
                const note = bookingDates.size === 1
                    ? 'Please confirm booking date of ' + [...bookingDates][0] + '.'
                    : 'Please confirm the booking dates noted above.';
                fill([255, 247, 224]); stroke([240, 196, 120]);
                doc.roundedRect(M, y, contentW, 10, 2, 2, 'FD');
                doc.setFont('helvetica', 'bold'); doc.setFontSize(10); ink([146, 100, 20]);
                doc.text(note, M + 5, y + 6.4);
                y += 14;
            }

            // ── footer on every page ─────────────────────────────────
            const pages = doc.internal.getNumberOfPages();
            for (let p = 1; p <= pages; p++) {
                doc.setPage(p);
                stroke(LINE); doc.line(M, pageH - 12, pageW - M, pageH - 12);
                doc.setFont('helvetica', 'normal'); doc.setFontSize(8); ink(MUTE);
                doc.text('SMV Defect Manager  ·  Defect Report', M, pageH - 7.5);
                doc.text('Page ' + p + ' of ' + pages, pageW - M, pageH - 7.5, { align: 'right' });
            }

            doc.save('Defect-Report-' + dateStr + '.pdf');
        }

        // One-tap PDF for the screen you're on — per job (address) or per supplier (contractor)
        // Context PDF (the 📑 icon on an address or contractor). Opens a small
        // dialog: pick statuses (default Open) and trades (all ticked by
        // default), then generate a PDF scoped to that address/contractor.
        function generateContextReport(ctx) {
            ctx = ctx || {};
            const tradeRows = db.data.trades.slice().sort((a, b) => (a.name || '').localeCompare(b.name || ''))
                .map(t => `<label class="rb-opt" style="display:flex;align-items:center;gap:8px;padding:5px 6px;font-size:14px;cursor:pointer"><input type="checkbox" class="cr-trade" value="${t.id}" checked style="width:auto"> ${t.name}</label>`).join('');
            const ctxLabel = ctx.addressId ? formatAddress(db.getAddress(ctx.addressId))
                : (ctx.contractorId ? ((db.getContractor(ctx.contractorId) || {}).name || '') : 'All defects');
            impOverlay(`
                <div id="imp-head"><strong>📑 Generate Report</strong><button id="imp-close">✕</button></div>
                <div id="imp-body">
                    <div class="imp-field"><label>For</label><div style="font-size:15px;font-weight:600">${ctxLabel}</div></div>
                    <div class="imp-field"><label>Statuses to include</label>
                        <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:14px;padding:4px 0">
                            <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="cr-st-open" checked style="width:auto"> Open</label>
                            <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="cr-st-pending" style="width:auto"> Pending</label>
                            <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="cr-st-completed" style="width:auto"> Completed</label>
                        </div></div>
                    <div class="imp-field"><label>Trades (all selected by default)</label>
                        <input type="text" id="cr-trade-search" placeholder="Search trades…" oninput="crFilterTrades(this.value)" style="width:100%;margin-bottom:4px">
                        <div style="display:flex;gap:10px;margin-bottom:4px">
                            <button type="button" class="imp-btn" style="padding:4px 10px;font-size:12px" onclick="crToggleTrades(true)">Select all</button>
                            <button type="button" class="imp-btn" style="padding:4px 10px;font-size:12px" onclick="crToggleTrades(false)">None</button>
                        </div>
                        <div id="cr-trade-list" style="max-height:150px;overflow:auto;border:1px solid var(--brd,#ccc);border-radius:10px;padding:4px">${tradeRows}</div></div>
                    <label style="display:flex;align-items:center;gap:8px;font-size:14px;margin:6px 0 4px"><input type="checkbox" id="cr-photos" checked style="width:auto"> Include photos</label>
                    <button class="imp-btn" id="cr-go">Generate PDF →</button>
                </div>`);
            document.getElementById('cr-go').onclick = () => runContextReport(ctx);
        }
        function crFilterTrades(q) {
            q = (q || '').toLowerCase().trim();
            document.querySelectorAll('#cr-trade-list .rb-opt').forEach(el => {
                el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }
        function crToggleTrades(on) {
            document.querySelectorAll('.cr-trade').forEach(cb => { cb.checked = on; });
        }
        async function runContextReport(ctx) {
            const statuses = ['open', 'pending', 'completed'].filter(s => document.getElementById('cr-st-' + s).checked);
            if (!statuses.length) { showToast('Tick at least one status', true); return; }
            const allTrades = db.data.trades.length;
            const sel = Array.from(document.querySelectorAll('.cr-trade:checked')).map(x => parseInt(x.value)).filter(Boolean);
            // All (or none) ticked = no trade filter, so defects without a matching
            // trade aren't silently dropped. A partial selection filters to it.
            const tradeIds = (sel.length && sel.length < allTrades) ? sel : null;
            const o = {
                addressIds: ctx.addressId ? [ctx.addressId] : [],
                contractorIds: ctx.contractorId ? [ctx.contractorId] : [],
                statuses, tradeIds,
                photos: document.getElementById('cr-photos').checked,
            };
            const list = reportFilteredDefects(o);
            if (!list.length) { showToast('No defects match those filters', true); return; }
            impSetBusy('Generating PDF… (' + list.length + ' defect' + (list.length > 1 ? 's' : '') + ')' + (o.photos ? ' with photos' : ''));
            try { await generateDefectPDF(list, o); impClose(); showToast('PDF report downloaded'); }
            catch (e) { console.error(e); impOverlayMessage('Could not generate PDF: ' + (e.message || e)); }
        }

        // True while the user is actively entering data we must NOT destroy with
        // a background re-render or an auto-update reload. Covers: a focused text
        // field, the add-defects forms, and any open overlay/modal (e.g. the
        // report import + defect-entry overlay). Exposed for cloud-sync.js too.
        function isBusyEditing() {
            try {
                const ae = document.activeElement;
                if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT')) return true;
                const v = (typeof state !== 'undefined') && state ? state.currentView : '';
                if (v === 'add-defects-address' || v === 'add-defects-contractor') return true;
                if (document.querySelector('#imp-ov, .modal.active, #cs-overlay')) return true;
            } catch (e) {}
            return false;
        }
        window.isBusyEditing = isBusyEditing;

        // Floating "refresh / get latest version" button — a manual escape hatch
        // to force the newest deploy (cache-busts the URL) if the auto-update
        // hasn't kicked in yet.
        function mountRefreshButton() {
            if (document.getElementById('app-refresh')) return;
            const b = document.createElement('button');
            b.id = 'app-refresh';
            b.innerHTML = '↻';
            b.title = 'Refresh — load the latest version';
            b.setAttribute('aria-label', 'Refresh app');
            b.onclick = async function () {
                b.disabled = true; b.style.opacity = '0.5';
                // Push anything pending, then clear the local sync baseline so the
                // reload does a CLEAN pull from the cloud — fixes a phone that's
                // drifted out of sync (stale photo badges, deletes reappearing).
                try { if (window.CloudSync && window.CloudSync.flush) await window.CloudSync.flush(); } catch (e) {}
                try {
                    localStorage.setItem('cs_dirty', '0');
                    localStorage.removeItem('cs_snapshot');
                    localStorage.removeItem('cs_idmap');
                } catch (e) {}
                const u = new URL(window.location.href);
                u.searchParams.set('_r', Date.now().toString());
                window.location.replace(u.toString());
            };
            b.style.cssText = 'position:fixed;left:12px;bottom:12px;z-index:99999;width:42px;height:42px;border-radius:50%;border:1px solid var(--brd,#bbb);background:var(--sur,#fff);color:var(--t1,#111);font-size:20px;line-height:1;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;';
            document.body.appendChild(b);
        }

        // Initialize app
        loadTheme();
        loadClubTheme();
        loadDesign();
        render();
        mountRefreshButton();
    </script>

    <!-- Service worker: precaches the app shell so the app OPENS with no signal,
         and auto-applies new versions (reload once when a new worker takes over). -->
    <script>
      if ('serviceWorker' in navigator) {
        let swReloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (swReloaded) return;
          // NEVER reload out from under someone entering data — that loses their
          // input. Wait until they're idle (not typing, not in a form/overlay),
          // then apply the update. Falls back to the next launch / manual ↻.
          const applyWhenIdle = () => {
            if (swReloaded) return;
            if (window.isBusyEditing && window.isBusyEditing()) { setTimeout(applyWhenIdle, 4000); return; }
            swReloaded = true;
            window.location.reload();
          };
          applyWhenIdle();
        });
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then((reg) => {
            reg.update();
            // Re-check for a new version whenever the app is brought back to front.
            document.addEventListener('visibilitychange', () => { if (!document.hidden) reg.update(); });
          }).catch((e) => console.warn('[SW] register failed', e));
        });
      }
    </script>
