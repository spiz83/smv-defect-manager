        // Autocomplete functionality
        function handleAutocomplete(input, type, inputId) {
            const value = input.value.toLowerCase();
            const dropdownId = (inputId || input.id) + '-dropdown';
            const dropdown = document.getElementById(dropdownId);
            
            if (!dropdown) return;
            
            // Determine if this is a "view" field or "add" field
            const isViewField = input.id.startsWith('search-');
            
            let items = [];
            
            if (type === 'address') {
                const isNumeric = /^\d/.test(value); // Check if searching for a number
                
                // Helper function to extract meaningful words (skip "lot", numbers, parentheses content)
                const getMeaningfulWords = (text) => {
                    const words = text.toLowerCase().split(/\s+/);
                    return words.filter(word => {
                        const cleaned = word.replace(/[()]/g, '');
                        return word !== 'lot' && word !== '-' && !/^\d+$/.test(cleaned) && cleaned.length > 0;
                    });
                };
                
                // Helper to get all searchable words from an address
                const getAllWords = (address) => {
                    const streetWords = address.street.toLowerCase().split(/\s+/);
                    const suburbWords = address.suburb.toLowerCase().split(/\s+/);
                    const propWords = address.propertyNumber ? address.propertyNumber.toLowerCase().split(/\s+/) : [];
                    return [...streetWords, ...suburbWords, ...propWords];
                };
                
                items = db.getAddresses().filter(a => {
                    const allWords = getAllWords(a);
                    
                    // If searching for a number, match any number that starts with search
                    if (isNumeric) {
                        return allWords.some(word => {
                            const numMatch = word.match(/\d+/);
                            return numMatch && numMatch[0].startsWith(value);
                        });
                    }
                    
                    // Otherwise, match any word starting with search term
                    return allWords.some(word => word.startsWith(value));
                })
                .sort((a, b) => {
                    // Get meaningful words (actual street/suburb names, not "Lot" or numbers)
                    const aMeaningfulStreet = getMeaningfulWords(a.street);
                    const bMeaningfulStreet = getMeaningfulWords(b.street);
                    const aMeaningfulSuburb = getMeaningfulWords(a.suburb);
                    const bMeaningfulSuburb = getMeaningfulWords(b.suburb);
                    
                    if (isNumeric) {
                        // Extract lot numbers for numeric search
                        const aLotMatch = a.street.toLowerCase().match(/lot\s*(\d+)/);
                        const bLotMatch = b.street.toLowerCase().match(/lot\s*(\d+)/);
                        const aLotNum = aLotMatch ? aLotMatch[1] : '';
                        const bLotNum = bLotMatch ? bLotMatch[1] : '';
                        
                        const aLotStarts = aLotNum.startsWith(value);
                        const bLotStarts = bLotNum.startsWith(value);
                        
                        if (aLotStarts && !bLotStarts) return -1;
                        if (!aLotStarts && bLotStarts) return 1;
                        
                        // Sort by lot number numerically
                        if (aLotStarts && bLotStarts) {
                            return parseInt(aLotNum) - parseInt(bLotNum);
                        }
                    } else {
                        // PRIORITY 1: First meaningful word in EITHER street OR suburb starts with search
                        const aFirstMeaningful = aMeaningfulStreet[0] || aMeaningfulSuburb[0] || '';
                        const bFirstMeaningful = bMeaningfulStreet[0] || bMeaningfulSuburb[0] || '';
                        const aFirstMatch = aFirstMeaningful.startsWith(value);
                        const bFirstMatch = bFirstMeaningful.startsWith(value);
                        
                        // PRIORITY 2: Any meaningful word starts with search
                        const allAMeaningful = [...aMeaningfulStreet, ...aMeaningfulSuburb];
                        const allBMeaningful = [...bMeaningfulStreet, ...bMeaningfulSuburb];
                        const aAnyMeaningfulMatch = allAMeaningful.some(w => w.startsWith(value));
                        const bAnyMeaningfulMatch = allBMeaningful.some(w => w.startsWith(value));
                        
                        // Score: 2 = first word match, 1 = any meaningful match, 0 = other match
                        const aScore = aFirstMatch ? 2 : (aAnyMeaningfulMatch ? 1 : 0);
                        const bScore = bFirstMatch ? 2 : (bAnyMeaningfulMatch ? 1 : 0);
                        
                        if (aScore !== bScore) return bScore - aScore;
                        
                        // If same score, sort by the matching word alphabetically
                        const aMatchWord = allAMeaningful.find(w => w.startsWith(value)) || '';
                        const bMatchWord = allBMeaningful.find(w => w.startsWith(value)) || '';
                        if (aMatchWord !== bMatchWord) {
                            return aMatchWord.localeCompare(bMatchWord);
                        }
                    }
                    
                    // Final fallback: alphabetical by street
                    return a.street.localeCompare(b.street);
                })
                .map(a => ({
                    label: `${a.street}, ${a.suburb}${a.propertyNumber ? ' - ' + a.propertyNumber : ''}`,
                    value: a.street,
                    id: a.id,
                    type: 'address',
                    street: a.street,
                    sub: [a.suburb || '', a.propertyNumber || ''].filter(Boolean).join(' · ')
                }));
            } else if (type === 'contractor') {
                items = db.getContractors().filter(c => {
                    const nameWords = c.name.toLowerCase().split(' ');
                    const tradesWords = c.trades ? c.trades.toLowerCase().split(' ') : [];
                    return nameWords.some(word => word.startsWith(value)) ||
                           tradesWords.some(word => word.startsWith(value));
                })
                .sort((a, b) => {
                    const aFirstWord = a.name.toLowerCase().split(' ')[0];
                    const bFirstWord = b.name.toLowerCase().split(' ')[0];
                    const aStartsWithValue = aFirstWord.startsWith(value);
                    const bStartsWithValue = bFirstWord.startsWith(value);
                    
                    // Prioritize contractors whose first word starts with the value
                    if (aStartsWithValue && !bStartsWithValue) return -1;
                    if (!aStartsWithValue && bStartsWithValue) return 1;
                    
                    // If both start with value (or both don't), sort alphabetically
                    return a.name.localeCompare(b.name);
                })
                .map(c => ({
                    label: `${c.name} - ${c.trades || 'No Trade'}`,
                    value: c.name,
                    id: c.id,
                    type: 'contractor'
                }));
            } else if (type === 'trade') {
                items = db.getTrades().filter(t => {
                    const tradeWords = t.name.toLowerCase().split(' ');
                    return tradeWords.some(word => word.startsWith(value));
                })
                .sort((a, b) => {
                    const aFirstWord = a.name.toLowerCase().split(' ')[0];
                    const bFirstWord = b.name.toLowerCase().split(' ')[0];
                    const aStartsWithValue = aFirstWord.startsWith(value);
                    const bStartsWithValue = bFirstWord.startsWith(value);
                    
                    // Prioritize trades whose first word starts with the value
                    if (aStartsWithValue && !bStartsWithValue) return -1;
                    if (!aStartsWithValue && bStartsWithValue) return 1;
                    
                    // If both start with value (or both don't), sort alphabetically
                    return a.name.localeCompare(b.name);
                })
                .map(t => ({
                    label: t.name,
                    value: t.name,
                    id: t.id,
                    type: 'trade'
                }));
            }
            
            if (items.length === 0 || value === '') {
                dropdown.classList.remove('active');
                return;
            }
            
            // Unified top search: each match on its own row with View (+ Add)
            // icons beside it. Add applies to address/contractor only (you can't
            // "add defects" to a trade). Addresses render two lines.
            // <div>s not <button>s — iOS Safari stacks buttons used as flex items.
            const withIcons = (input.id === 'unified-search');
            // Match the My Jobs list row styling exactly (same padding, text
            // sizes, 40px icons) so search results look identical to the list.
            const ico = 'flex:0 0 auto;width:40px;height:40px;border-radius:8px;border:1px solid var(--brd,rgba(128,128,128,.3));cursor:pointer;font-size:18px;line-height:38px;text-align:center;';
            dropdown.innerHTML = items.slice(0, 5).map(item => {
                if (withIcons) {
                    const canAdd = (item.type === 'address' || item.type === 'contractor');
                    const main = item.type === 'address'
                        ? `<div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.street}</div>${item.sub ? `<div style="font-size:12px;opacity:.65;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.sub}</div>` : ''}`
                        : `<div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.label}</div>`;
                    return `
                    <div class="autocomplete-item" style="display:flex;flex-wrap:nowrap;align-items:center;gap:8px;padding:10px 12px;font-size:15px;">
                        <div style="flex:1 1 auto;min-width:0;overflow:hidden;cursor:pointer;" onclick="viewDefectsFor('${item.type}', ${item.id})">${main}</div>
                        <div style="flex:0 0 auto;display:flex;gap:6px;">
                            <div style="${ico}" onclick="event.stopPropagation();viewDefectsFor('${item.type}', ${item.id})" title="View defects">👁️</div>
                            ${canAdd ? `<div style="${ico}color:var(--acc,#2563eb);font-weight:800;" onclick="event.stopPropagation();addDefectsFor('${item.type}', ${item.id})" title="Add defects">＋</div>` : ''}
                        </div>
                    </div>`;
                }
                return `
                <div class="autocomplete-item" onclick="selectAutocomplete('${input.id}', '${item.value.replace(/'/g, "\\'")}', '${dropdownId}', ${item.id}, '${item.type}', ${isViewField})">
                    ${item.label}
                </div>`;
            }).join('');

            dropdown.classList.add('active');
        }

        function selectAutocomplete(inputId, value, dropdownId, itemId, itemType, isViewField) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);
            
            if (dropdown) dropdown.classList.remove('active');
            
            // If this is a "view" field (search-address, search-contractor, search-trade), navigate to view page
            if (isViewField) {
                if (itemType === 'address') {
                    state.currentView = 'view-defects-address';
                    state.filters = { addressId: itemId };
                    render();
                } else if (itemType === 'contractor') {
                    state.currentView = 'view-defects-contractor';
                    state.filters = { contractorId: itemId };
                    render();
                } else if (itemType === 'trade') {
                    // For trade, show defects from contractors with that trade
                    showDefectsForTrade(itemId);
                }
            } else {
                // For "add" fields, navigate to add-defects page
                if (inputId === 'add-address') {
                    state.currentView = 'add-defects-address';
                    state.filters = { addressId: itemId };
                    render();
                } else if (inputId === 'add-contractor') {
                    state.currentView = 'add-defects-contractor';
                    state.filters = { contractorId: itemId };
                    render();
                } else {
                    // For other fields (like in modals), just fill in the value
                    if (input) input.value = value;
                }
            }
        }

        // Quick Add Autocomplete Handlers
        function handleQuickAddressAutocomplete(input) {
            const value = input.value.toLowerCase();
            const dropdown = document.getElementById('quick-address-dropdown');
            
            if (!dropdown) return;
            
            const isNumeric = /^\d/.test(value);
            
            const addresses = db.getAddresses().filter(a => {
                const streetWords = a.street.toLowerCase().split(' ');
                const suburbWords = a.suburb.toLowerCase().split(' ');
                const lotNumber = a.propertyNumber ? a.propertyNumber.toLowerCase() : '';
                
                if (isNumeric) {
                    return lotNumber.startsWith(value) ||
                           streetWords.some(word => word.startsWith(value));
                }
                
                return streetWords.some(word => word.startsWith(value)) || 
                       suburbWords.some(word => word.startsWith(value));
            }).sort((a, b) => {
                if (isNumeric) {
                    const aLotMatch = a.propertyNumber && a.propertyNumber.toLowerCase().startsWith(value);
                    const bLotMatch = b.propertyNumber && b.propertyNumber.toLowerCase().startsWith(value);
                    if (aLotMatch && !bLotMatch) return -1;
                    if (!aLotMatch && bLotMatch) return 1;
                    
                    const aStreetFirst = a.street.toLowerCase().split(' ')[0];
                    const bStreetFirst = b.street.toLowerCase().split(' ')[0];
                    const aStreetMatch = aStreetFirst.startsWith(value);
                    const bStreetMatch = bStreetFirst.startsWith(value);
                    if (aStreetMatch && !bStreetMatch) return -1;
                    if (!aStreetMatch && bStreetMatch) return 1;
                } else {
                    const aStreetWords = a.street.toLowerCase().split(' ');
                    const bStreetWords = b.street.toLowerCase().split(' ');
                    
                    const aStreetMatch = aStreetWords.some(word => word.startsWith(value));
                    const bStreetMatch = bStreetWords.some(word => word.startsWith(value));
                    
                    if (aStreetMatch && !bStreetMatch) return -1;
                    if (!aStreetMatch && bStreetMatch) return 1;
                    
                    if (aStreetMatch && bStreetMatch) {
                        const aFirstWord = aStreetWords[0].startsWith(value);
                        const bFirstWord = bStreetWords[0].startsWith(value);
                        if (aFirstWord && !bFirstWord) return -1;
                        if (!aFirstWord && bFirstWord) return 1;
                    }
                }
                return a.street.localeCompare(b.street);
            });
            
            if (addresses.length === 0 || value === '') {
                dropdown.classList.remove('active');
                return;
            }
            
            dropdown.innerHTML = addresses.slice(0, 5).map(a => `
                <div class="autocomplete-item" onclick="selectQuickAddress(${a.id}, '${a.street}, ${a.suburb}${a.propertyNumber ? ' - ' + a.propertyNumber : ''}')">
                    ${a.street}, ${a.suburb}${a.propertyNumber ? ' - ' + a.propertyNumber : ''}
                </div>
            `).join('');
            
            dropdown.classList.add('active');
        }

        // Add Defects Page Autocomplete Handlers
        function handleAddDefectsAddressAutocomplete(input) {
            const value = input.value.toLowerCase();
            const dropdown = document.getElementById('add-defects-address-dropdown');
            
            if (!dropdown) return;
            
            const isNumeric = /^\d/.test(value);
            
            const addresses = db.getAddresses().filter(a => {
                const streetWords = a.street.toLowerCase().split(' ');
                const suburbWords = a.suburb.toLowerCase().split(' ');
                const lotNumber = a.propertyNumber ? a.propertyNumber.toLowerCase() : '';
                
                if (isNumeric) {

                           streetWords.some(word => word.startsWith(value));
                }
                
                return streetWords.some(word => word.startsWith(value)) || 
                       suburbWords.some(word => word.startsWith(value));
            }).sort((a, b) => {
                if (isNumeric) {
                    const aLotMatch = a.propertyNumber && a.propertyNumber.toLowerCase().startsWith(value);
                    const bLotMatch = b.propertyNumber && b.propertyNumber.toLowerCase().startsWith(value);
                    if (aLotMatch && !bLotMatch) return -1;
                    if (!aLotMatch && bLotMatch) return 1;
                    
                    const aStreetFirst = a.street.toLowerCase().split(' ')[0];
                    const bStreetFirst = b.street.toLowerCase().split(' ')[0];
                    const aStreetMatch = aStreetFirst.startsWith(value);
                    const bStreetMatch = bStreetFirst.startsWith(value);
                    if (aStreetMatch && !bStreetMatch) return -1;
                    if (!aStreetMatch && bStreetMatch) return 1;
                } else {
                    const aStreetWords = a.street.toLowerCase().split(' ');
                    const bStreetWords = b.street.toLowerCase().split(' ');
                    
                    const aStreetMatch = aStreetWords.some(word => word.startsWith(value));
                    const bStreetMatch = bStreetWords.some(word => word.startsWith(value));
                    
                    if (aStreetMatch && !bStreetMatch) return -1;
                    if (!aStreetMatch && bStreetMatch) return 1;
                    
                    if (aStreetMatch && bStreetMatch) {
                        const aFirstWord = aStreetWords[0].startsWith(value);
                        const bFirstWord = bStreetWords[0].startsWith(value);
                        if (aFirstWord && !bFirstWord) return -1;
                        if (!aFirstWord && bFirstWord) return 1;
                    }
                }
                return a.street.localeCompare(b.street);
            });
            
            if (addresses.length === 0 || value === '') {
                dropdown.classList.remove('active');
                return;
            }
            
            dropdown.innerHTML = addresses.slice(0, 5).map(a => `
                <div class="autocomplete-item" onclick="selectAddDefectsAddress(${a.id}, '${a.street}, ${a.suburb}${a.propertyNumber ? ' - ' + a.propertyNumber : ''}')">
                    ${a.street}, ${a.suburb}${a.propertyNumber ? ' - ' + a.propertyNumber : ''}

            `).join('');
            
            dropdown.classList.add('active');
        }

        // Attach a photo to a defect input row BEFORE it is saved. Files are
        // held on the row element and uploaded after the defect saves + syncs.
        function pickRowPhoto(btn) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.setAttribute('capture', 'environment');
            // iOS reliability: a DETACHED file input frequently fails to deliver
            // the photo on the FIRST capture (onchange never fires), so the user
            // has to tap the camera twice. Attach it to the DOM (off-screen)
            // before clicking, and clean it up afterwards.
            input.style.cssText = 'position:fixed;left:-9999px;top:0;width:1px;height:1px;opacity:0;';
            document.body.appendChild(input);
            let done = false;
            const cleanup = () => {
                if (done) return; done = true;
                window.removeEventListener('focus', onFocus);
                setTimeout(() => { try { input.remove(); } catch (e) {} }, 0);
            };
            // Cancelling the camera fires no change event — clean up on return.
            const onFocus = () => setTimeout(() => { if (!input.files || !input.files.length) cleanup(); }, 1500);
            window.addEventListener('focus', onFocus);
            input.onchange = async () => {
                const f = input.files && input.files[0];
                if (!f) { cleanup(); return; }
                const row = btn.closest('.defect-input-row');
                if (!row) { cleanup(); return; }
                // Offer the markup/text editor on capture (same as the gallery).
                let img = f;
                if (window.CloudPhotos && window.CloudPhotos.editPhoto) {
                    const edited = await window.CloudPhotos.editPhoto(f);
                    if (edited === null) { cleanup(); return; }   // cancelled
                    img = edited || f;
                }
                row._photos = row._photos || [];
                row._photos.push(img);
                btn.classList.add('has');
                btn.innerHTML = '📷' + (row._photos.length > 1 ? `<span class="cnt">${row._photos.length}</span>` : '');
                showToast('Photo attached — it saves with this defect');
                cleanup();
            };
            input.click();
        }

        // Upload any row photos once the defect exists in the cloud. Prefer the
        // durable queue (persists each photo to IndexedDB so it can't be lost if
        // the app is closed before it finishes uploading); fall back to the
        // in-memory wait-and-upload path if that isn't available.
        function uploadRowPhotos(row, legacyId) {
            if (!row || !row._photos || !row._photos.length) return;
            const cp = window.CloudPhotos;
            if (!(cp && (cp.queueRowPhoto || cp.uploadWhenReady))) {
                showToast('Log in to attach photos', true);
                return;
            }
            row._photos.forEach(file => (cp.queueRowPhoto || cp.uploadWhenReady)(legacyId, file));
        }

        function applyRowExtras(row, legacyId) {

        // Unified function to generate defect text for clipboard/export/email
        function generateDefectText() {

                    const bk = group.address ? db.getContractorBooking(contractor.id, group.address.id) : '';

                    textContent += `${formatAddress(group.address)}\n`;
                    textContent += `\n${contractor.name}${bk ? '  —  Attend: ' + fmtDateNice(bk) : ''}\n`;
                    group.defects.forEach(defect => {
                        textContent += `• ${defect.location ? defect.location + ' - ' : ''}${defect.description}\n`;
                    });
                    textContent += '\n';
                });
                
            } else if (state.currentView === 'view-defects-address' && state.filters.addressId) {
                // Address view - group by contractor
                const address = db.getAddress(state.filters.addressId);
                const defects = db.getDefects({ addressId: state.filters.addressId });
                
                // Group by contractor
                const byContractor = {};
                defects.forEach(d => {
                    const contractor = db.getContractor(d.contractorId);
                    const contractorName = contractor ? contractor.name : 'Unknown Contractor';
                    if (!byContractor[contractorName]) {
                        byContractor[contractorName] = [];
                    }
                    byContractor[contractorName].push(d);
                });
                
                textContent += `${formatAddress(address)}\n`;
                
                Object.keys(byContractor).sort().forEach(contractorName => {
                    const ds = byContractor[contractorName];
                    const bk = ds[0] ? db.getContractorBooking(ds[0].contractorId, ds[0].addressId) : '';
                    if (bk) bookingDates.add(fmtDateNice(bk));
                    textContent += `\n${contractorName}${bk ? '  —  Attend: ' + fmtDateNice(bk) : ''}\n`;
                    ds.forEach(defect => {
                        textContent += `• ${defect.location ? defect.location + ' - ' : ''}${defect.description}\n`;
                    });
                });
                textContent += '\n';
                
            } else if (state.currentView === 'view-defects-trade' && state.filters) {
                // Trade view - group by address then contractor
                const { tradeName, contractorIds } = state.filters;
                const defects = db.getDefects().filter(d => contractorIds.includes(d.contractorId));
                
                // Group by address first, then by contractor
                const byAddress = {};

                    const address = db.getAddress(d.addressId);
                    const contractor = db.getContractor(d.contractorId);
                    if (!address || !contractor) return;
                    
                    const addressKey = formatAddress(address);
                    if (!byAddress[addressKey]) {
                        byAddress[addressKey] = { contractors: {} };
                    }
                    if (!byAddress[addressKey].contractors[contractor.name]) {
                        byAddress[addressKey].contractors[contractor.name] = [];
                    }
                    byAddress[addressKey].contractors[contractor.name].push(d);
                });
                
                Object.keys(byAddress).sort().forEach(addressKey => {
                    textContent += `${addressKey}\n`;
                    Object.keys(byAddress[addressKey].contractors).sort().forEach(contractorName => {
                        const ds = byAddress[addressKey].contractors[contractorName];
                        const bk = ds[0] ? db.getContractorBooking(ds[0].contractorId, ds[0].addressId) : '';
                        if (bk) bookingDates.add(fmtDateNice(bk));
                        textContent += `\n${contractorName}${bk ? '  —  Attend: ' + fmtDateNice(bk) : ''}\n`;
                        ds.forEach(defect => {
                            textContent += `• ${defect.location ? defect.location + ' - ' : ''}${defect.description}\n`;
                        });
                    });
                    textContent += '\n';
                });
                
            } else if (state.currentView === 'view-multiple-contractors' && state.filters.contractorIds) {
                // Multiple contractors view - group by address then contractor
                const defects = db.getDefects().filter(d => state.filters.contractorIds.includes(d.contractorId));
                
                const byAddress = {};
                defects.forEach(d => {
                    const address = db.getAddress(d.addressId);
                    const contractor = db.getContractor(d.contractorId);
                    if (!address || !contractor) return;
                    
                    const addressKey = formatAddress(address);
                    if (!byAddress[addressKey]) {
                        byAddress[addressKey] = { contractors: {} };
                    }
                    if (!byAddress[addressKey].contractors[contractor.name]) {
                        byAddress[addressKey].contractors[contractor.name] = [];
                    }
                    byAddress[addressKey].contractors[contractor.name].push(d);
                });
                
                Object.keys(byAddress).sort().forEach(addressKey => {
                    textContent += `${addressKey}\n`;
                    Object.keys(byAddress[addressKey].contractors).sort().forEach(contractorName => {
                        const ds = byAddress[addressKey].contractors[contractorName];
                        const bk = ds[0] ? db.getContractorBooking(ds[0].contractorId, ds[0].addressId) : '';
                        if (bk) bookingDates.add(fmtDateNice(bk));

            return textContent;
        }

        function copyDefectsToClipboard() {
            const textContent = generateDefectText();
            
            // Use modern clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textContent)
                    .then(() => {
                        showToast('📋 Copied to clipboard!');
                    })
                    .catch(err => {
                        // Fallback to older method
                        fallbackCopyToClipboard(textContent);
                    });
            } else {
                // Fallback for older browsers
                fallbackCopyToClipboard(textContent);
            }
        }

        function fallbackCopyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast('📋 Copied to clipboard!');
            } catch (err) {
                showToast('Failed to copy to clipboard', true);
            }
            
            document.body.removeChild(textarea);
        }

        // Email ONE supplier their open items (with photo links) for this address
        async function emailSupplier(contractorId, addressId) {
            const c = db.getContractor(contractorId);
            const addr = formatAddress(db.getAddress(addressId));
            const defects = (db.data.defects || []).filter(d =>
                d.addressId === addressId && d.contractorId === contractorId && !d.completed);
            if (!defects.length) { showToast('No open items for this supplier', true); return; }
            if (!c) { showToast('Supplier not found', true); return; }
            // No email on file? Ask for it, validate, save so we don't ask again.
            if (!c.email) {
                const entered = prompt('No email on file for ' + c.name + '.\n\nEnter their email address — it will be saved for next time:', '');
                if (entered === null) return;                       // cancelled
                const email = entered.trim();
                if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { showToast('That doesn’t look like a valid email', true); return; }
                c.email = email; db.save();                          // persists locally + syncs to cloud
                showToast('Email saved for ' + c.name);
            }
            showToast('Preparing email…');
            const booking = db.getContractorBooking(contractorId, addressId);
            const subject = 'Defects - ' + addr;
            let body = addr + '\n\n' + c.name + '\n';
            const files = [];
            for (const d of defects) {
                body += '• ' + (d.location ? d.location + ' - ' : '') + d.description + '\n';
                if (window.CloudPhotos && window.CloudPhotos.getFiles) {
                    try { (await window.CloudPhotos.getFiles(d.id)).forEach(f => files.push(f)); } catch (e) {}
                }
            }
            if (booking) body += '\nPlease confirm booking date of ' + fmtDateNice(booking) + '.\n';

            // Prefer the share sheet so the actual photos ATTACH to the email
            // (clean), instead of pasting long, messy links. Falls back to a
            // plain mailto where attaching files isn't supported (e.g. desktop).
            if (files.length && navigator.canShare && navigator.canShare({ files })) {
                try {
                    await navigator.share({ title: subject, text: body, files });
                    return;
                } catch (e) {
                    if (e && e.name === 'AbortError') return;   // user closed the sheet
                    /* otherwise fall through to mailto */
                }
            }
            window.location.href = 'mailto:' + encodeURIComponent(c.email) +
                '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
        }

        function handleContractorAutocomplete(input, groupIndex) {
            const value = input.value.toLowerCase();
            const dropdown = document.getElementById(`contractor-dropdown-${groupIndex}`);
            
            if (!dropdown) return;
            
            const contractors = db.getContractors().filter(c => 
                {
                const nameWords = c.name.toLowerCase().split(' ');
                const tradesWords = c.trades ? c.trades.toLowerCase().split(' ') : [];
                return nameWords.some(word => word.startsWith(value)) ||
                       tradesWords.some(word => word.startsWith(value));
            });
            
            if (contractors.length === 0 || value === '') {
                dropdown.classList.remove('active');

        function handleAddressAutocomplete(input, groupIndex) {
            const value = input.value.toLowerCase();
            const dropdown = document.getElementById(`address-dropdown-${groupIndex}`);
            
            if (!dropdown) return;
            
            const isNumeric = /^\d/.test(value);
            
            const addresses = db.getAddresses().filter(a => {
                const streetWords = a.street.toLowerCase().split(' ');
                const suburbWords = a.suburb.toLowerCase().split(' ');
                const lotNumber = a.propertyNumber ? a.propertyNumber.toLowerCase() : '';
                
                if (isNumeric) {
                    return lotNumber.startsWith(value) ||
                           streetWords.some(word => word.startsWith(value));
                }
                
                return streetWords.some(word => word.startsWith(value)) || 
                       suburbWords.some(word => word.startsWith(value));
            }).sort((a, b) => {
                if (isNumeric) {
                    const aLotMatch = a.propertyNumber && a.propertyNumber.toLowerCase().startsWith(value);
                    const bLotMatch = b.propertyNumber && b.propertyNumber.toLowerCase().startsWith(value);
                    if (aLotMatch && !bLotMatch) return -1;
                    if (!aLotMatch && bLotMatch) return 1;
                    
                    const aStreetFirst = a.street.toLowerCase().split(' ')[0];
                    const bStreetFirst = b.street.toLowerCase().split(' ')[0];
                    const aStreetMatch = aStreetFirst.startsWith(value);
                    const bStreetMatch = bStreetFirst.startsWith(value);
                    if (aStreetMatch && !bStreetMatch) return -1;
                    if (!aStreetMatch && bStreetMatch) return 1;
                } else {
                    const aStreetWords = a.street.toLowerCase().split(' ');
                    const bStreetWords = b.street.toLowerCase().split(' ');
                    
                    const aStreetMatch = aStreetWords.some(word => word.startsWith(value));
                    const bStreetMatch = bStreetWords.some(word => word.startsWith(value));
                    
                    if (aStreetMatch && !bStreetMatch) return -1;
                    if (!aStreetMatch && bStreetMatch) return 1;
                    
                    if (aStreetMatch && bStreetMatch) {
                        const aFirstWord = aStreetWords[0].startsWith(value);
                        const bFirstWord = bStreetWords[0].startsWith(value);
                        if (aFirstWord && !bFirstWord) return -1;
                        if (!aFirstWord && bFirstWord) return 1;
                    }
                }
                return a.street.localeCompare(b.street);
            });
            
            if (addresses.length === 0 || value === '') {
                dropdown.classList.remove('active');
                return;
            }
            
            dropdown.innerHTML = addresses.slice(0, 5).map(a => `
                <div class="autocomplete-item" onclick="selectAddressForGroup(${groupIndex}, ${a.id}, '${a.street.replace(/'/g, "\\'")}')">
                    ${a.street}, ${a.suburb}${a.propertyNumber ? ' - ' + a.propertyNumber : ''}
                </div>
            `).join('');
            
            dropdown.classList.add('active');
        }

        function selectAddressForGroup(groupIndex, addressId, street) {
            const input = document.querySelector(`#address-group-${groupIndex} .address-input`);
            const dropdown = document.getElementById(`address-dropdown-${groupIndex}`);
            
            if (input) {
                input.value = street;
                input.setAttribute('data-address-id', addressId);
            }
            if (dropdown) dropdown.classList.remove('active');
        }

        function applyBulkTradeAssignment() {
            // Get selected contractors
            const contractorCheckboxes = document.querySelectorAll('[id^="bulk-contractor-"]:checked');
            const selectedContractorIds = Array.from(contractorCheckboxes).map(cb => parseInt(cb.value));

            // Get selected trades
            const tradeCheckboxes = document.querySelectorAll('[id^="bulk-trade-"]:checked');
            const selectedTradeIds = Array.from(tradeCheckboxes).map(cb => parseInt(cb.value));

            if (selectedContractorIds.length === 0) {
                showToast('Please select at least one contractor', true);
                return;
            }

            if (selectedTradeIds.length === 0) {
                showToast('Please select at least one trade', true);
                return;
            }

            // Apply trades to contractors
            let updatedCount = 0;
            selectedContractorIds.forEach(contractorId => {
                const contractor = db.getContractor(contractorId);
                if (contractor) {
                    // Merge new trades with existing ones (no duplicates)
                    const existingTradeIds = contractor.tradeIds || [];
                    const mergedTradeIds = [...new Set([...existingTradeIds, ...selectedTradeIds])];
                    
                    // Update contractor
                    contractor.tradeIds = mergedTradeIds;
                    
                    // Build trades string
                    const trades = db.getTrades()
                        .filter(t => mergedTradeIds.includes(t.id))
                        .map(t => t.name)
                        .join(', ');
                    contractor.trades = trades;
                    
                    updatedCount++;
                }
            });

            // Save to database
            db.save();

            closeModal('bulk-assign-trades-modal');
            showToast(`✓ Assigned trades to ${updatedCount} contractor(s)`);
            render();
        }

        function exportAllData() {

            const timestamp = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
            const filename = `DefectTracker_Backup_${timestamp}.json`;
            
            const jsonString = JSON.stringify(data, null, 2);

        function handleBackupImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    // Validate data structure
                    if (!data.addresses || !data.contractors || !data.trades || !data.defects) {
                        showToast('Invalid backup file format', true);
                        return;
                    }
                    
                    // Confirm before importing
                    if (!confirm(`Import backup? This will replace all current data.\n\nBackup contains:\n- ${data.addresses.length} addresses\n- ${data.contractors.length} contractors\n- ${data.trades.length} trades\n- ${data.defects.length} defects`)) {
                        return;
                    }
                    
                    // Import the data
                    localStorage.setItem('defectTrackerDB', JSON.stringify(data));
                    
                    showToast('Backup imported successfully! Reloading...');
                    
                    setTimeout(() => {
                        location.reload();
                    }, 1000);
                    
                } catch (err) {
                    showToast('Failed to import backup: Invalid JSON file', true);
                    console.error(err);
                }
                
                // Reset file input
                event.target.value = '';
            };
            
            reader.readAsText(file);
        }

        // "My Jobs" — the jobs allocated to the logged-in supervisor (matched by
        // current_supervisor_id === my user id). Tap a job to start logging defects.
        function renderMyJobsSection() {
            const cj = window.CloudJobs;
            const uid = (cj && cj.currentUserId) ? cj.currentUserId() : null;
            const isMgr = !!(cj && cj.isManager && cj.isManager());
            // Show ONLY jobs currently in construction (lifecycle status
            // 'active') — never pre-planner / admin (pre-site) / completed /
            // handed-over. Safety net: if NO job has a status yet (data still
            // loading), show all rather than a false-empty list — but the moment
            // any status is present, filter strictly.
            let list = db.getAddresses();
            if (list.some(a => a.jobStatus)) list = list.filter(a => a.jobStatus === 'active');
            // Supervisors see only their own jobs (when we know who they are);
            // managers — or an unresolved session — see ALL of them. Only narrow
            // by supervisor once supervisor data has actually loaded, so a slow
            // sync doesn't momentarily blank the whole list.
            const supDataLoaded = list.some(a => a.supervisorId);
            if (!isMgr && uid && supDataLoaded) list = list.filter(a => a.supervisorId === uid);
            // Sort alphabetically by street name, then by lot number. Prefer the
            // clean fields from the data layer; fall back to parsing the combined
            // "Lot N, [house] Street" for any not-yet-resynced cached rows.
            const streetKey = (a) => (a.streetName != null ? a.streetName
                : ((a.street || '').includes(',')
                    ? a.street.slice(a.street.indexOf(',') + 1).replace(/[()]/g, '').replace(/^\s*\d+[a-zA-Z]?\s+/, '')
                    : (a.street || ''))).trim().toLowerCase();
            const lotKey = (a) => { if (typeof a.lotNo === 'number') return a.lotNo; const m = (a.street || '').match(/\d+/); return m ? parseInt(m[0], 10) : 0; };
            list = [...list].sort((a, b) => streetKey(a).localeCompare(streetKey(b)) || (lotKey(a) - lotKey(b)));
            // Built from <div>s (not <button>s): iOS Safari mishandles buttons as
            // flex items and was stacking the icons under the address. Icons live
            // in a fixed-width group so they always sit BESIDE the address.
            // Outstanding (not-completed) defect count per job, for the markers.
            const markersOn = showDefectMarkers();
            const outstanding = {};
            (db.data.defects || []).forEach(d => {
                if (d.status === 'completed' || d.completed) return;
                outstanding[d.addressId] = (outstanding[d.addressId] || 0) + 1;
            });
            const baseRow = 'display:flex;flex-wrap:nowrap;align-items:center;gap:8px;width:100%;padding:10px 12px;border-bottom:1px solid var(--brd,rgba(128,128,128,.25));box-sizing:border-box;';
            const addrStyle = 'flex:1 1 auto;min-width:0;cursor:pointer;overflow:hidden;';
            const icoStyle = 'flex:0 0 auto;width:40px;height:40px;border-radius:8px;border:1px solid var(--brd,rgba(128,128,128,.3));cursor:pointer;font-size:18px;line-height:38px;text-align:center;';
            const rows = list.map(a => {
                const sub = [a.suburb || '', a.propertyNumber || '', isMgr ? (a.supervisorName || 'Unassigned') : '']
                    .filter(Boolean).join(' · ');
                const key = `${a.street} ${a.suburb || ''} ${a.propertyNumber || ''} ${a.supervisorName || ''}`.toLowerCase();
                const oc = outstanding[a.id] || 0;
                const flagged = markersOn && oc > 0;
                // Flagged jobs get a red left bar + a count badge so it's obvious
                // there are defects logged here that are still outstanding.
                const rowStyle = baseRow + (flagged ? 'border-left:4px solid var(--red,#DC143C);padding-left:8px;' : '');
                const badge = flagged
                    ? `<span title="${oc} outstanding defect${oc > 1 ? 's' : ''}" style="flex:0 0 auto;min-width:22px;height:22px;line-height:22px;text-align:center;padding:0 6px;border-radius:11px;background:var(--red,#DC143C);color:#fff;font-size:12px;font-weight:400;">${oc}</span>`
                    : '';
                return `
                <div data-job-search="${key}" style="${rowStyle}">
                    <div style="${addrStyle}" onclick="viewDefectsForJob(${a.id})" title="View defects">
                        <div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.street}</div>
                        <div style="font-size:12px;opacity:.65;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${sub}</div>
                    </div>
                    ${badge}
                    <div style="flex:0 0 auto;display:flex;gap:6px;">
                        <div style="${icoStyle}" onclick="viewDefectsForJob(${a.id})" title="View defects">👁️</div>
                        <div style="${icoStyle}color:var(--acc,#2563eb);font-weight:800;" onclick="startDefectsForJob(${a.id})" title="Add defects">＋</div>
                    </div>
                </div>`;
            }).join('');
            const title = isMgr ? 'All Active Jobs' : 'My Jobs';
            const emptyMsg = isMgr
                ? 'Loading jobs… if this stays empty, tap ↻ (bottom-left) to refresh.'
                : 'No jobs allocated to you yet. Use the search at the top, or tap ↻ (bottom-left) to refresh.';
            const body = list.length ? rows : `<div style="padding:16px;opacity:.7;font-size:13px;">${emptyMsg}</div>`;
            return `
                <div class="section-title">${title}${list.length ? ` (${list.length})` : ''}</div>
                <div id="myjobs-list" style="border:1px solid var(--brd,rgba(128,128,128,.25));border-radius:10px;overflow:hidden;max-height:360px;overflow-y:auto;margin-bottom:18px;">
                    ${body}
                </div>`;
        }

            const esc = (s) => (s || '').replace(/"/g, '&quot;');
            // Real phonebook picker only exists on Android Chrome; iOS Safari has
            // no contacts API, so there we fall back to importing a contact file.
            const hasPicker = ('contacts' in navigator) && navigator.contacts && typeof navigator.contacts.select === 'function';
            const contactBtn = hasPicker
                ? `<button type="button" onclick="pickPhoneContact()" style="flex:0 0 auto;border:1px solid var(--border-color,#ccc);border-radius:9px;padding:12px 14px;font-weight:600;font-size:14px;cursor:pointer;background:transparent;color:inherit;">📇 From contacts</button>`
                : `<label style="flex:0 0 auto;border:1px solid var(--border-color,#ccc);border-radius:9px;padding:12px 14px;font-weight:600;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;">📇 Contact file
                       <input type="file" accept=".vcf,text/vcard,text/x-vcard" style="display:none" onchange="importVcardToContractor(event)">
                   </label>`;
            const contactHint = hasPicker ? ''
                : `<div style="font-size:11.5px;color:var(--text-secondary,#999);margin-top:8px;line-height:1.4;">iPhone can’t open your contacts directly. To pull one in: Contacts → the person → <b>Share Contact</b> → <b>Save to Files</b>, then tap <b>Contact file</b> above. Or just type it in.</div>`;
            impOverlay(`
                <div id="imp-head"><strong>👤 ${editC ? 'Edit' : 'Add'} contractor</strong><button id="imp-close">✕</button></div>
                <div id="imp-body" style="padding:16px;">
                    <div style="font-size:12.5px;color:var(--text-secondary,#888);margin-bottom:12px;line-height:1.4;">
                        ${editC ? 'Clean up the details, then Save. Use “Share to team” in Manage to make it visible to everyone.'

                                : '🔒 Only you will see this contractor until a manager checks it and shares it to the team.'}
                    </div>
                    <label style="${lbl}">Name <span style="color:#dc2626;">*</span></label>
                    <input id="ac-name" type="text" value="${esc(editC ? editC.name : prefillName)}" placeholder="Contractor / business name" style="${inp}">

                    <input id="ac-phone" type="text" inputmode="tel" value="${esc(editC && editC.phone)}" placeholder="Phone" style="${inp}">

        }
        // Android Chrome only: open the real phone contacts list and pull one in.
        async function pickPhoneContact() {
            try {
                if (!('contacts' in navigator) || !navigator.contacts.select) {
                    showToast('Your phone can’t open contacts here — use a contact file or type it'); return;
                }
                const sel = await navigator.contacts.select(['name', 'tel', 'email'], { multiple: false });
                if (!sel || !sel.length) return;
                const c = sel[0];
                const set = (id, v) => { const el = document.getElementById(id); if (el && v) el.value = v; };
                set('ac-name', (c.name && c.name[0]) || '');
                set('ac-phone', (c.tel && c.tel[0]) || '');
                set('ac-email', (c.email && c.email[0]) || '');
                showToast('Contact loaded — check the details and save');
            } catch (e) { /* user cancelled / denied — no-op */ }
        }
        function importVcardToContractor(e) {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                const text = String(reader.result || '');
                const grab = (re) => { const m = text.match(re); return m ? m[1].trim() : ''; };
                const fn = grab(/^FN[^:\n]*:(.+)$/im) || grab(/^N[^:\n]*:(.+)$/im);
                const tel = grab(/^TEL[^:\n]*:(.+)$/im);
                const email = grab(/^EMAIL[^:\n]*:(.+)$/im);
                const set = (id, v) => { const el = document.getElementById(id); if (el && v) el.value = v; };
                set('ac-name', fn); set('ac-phone', tel); set('ac-email', email);
                showToast('Contact loaded — check the details and save');
            };
            reader.onerror = () => showToast('Could not read that contact file');
            reader.readAsText(file);
        }
        function saveNewContractor() {
            const val = (id) => (document.getElementById(id) || {}).value || '';
            const name = val('ac-name').trim();
            if (!name) { showToast('Enter a contractor name'); return; }
            const newTrade = val('ac-trade-new').trim();
            const existingTradeId = val('ac-trade-existing');
            let tradeIds = [];
            if (newTrade) { const t = db.addTrade({ name: newTrade }); if (t) tradeIds = [t.id]; }
            else if (existingTradeId) { tradeIds = [parseInt(existingTradeId, 10)]; }
            const phone = val('ac-phone').trim(), email = val('ac-email').trim();
            if (_editingContractorId != null) {
                // Edit existing (manager cleanup) — keep its sharing state.
                const c = db.getContractor(_editingContractorId);
                if (c) {
                    c.name = name; c.phone = phone; c.email = email;
                    if (tradeIds.length) { c.tradeIds = tradeIds; c.trades = tradeIds.map(id => (db.data.trades.find(t => t.id === id) || {}).name).filter(Boolean).join(', ') || 'No Trade Assigned'; }
                    db.save();
                }
                _editingContractorId = null;
                impClose(); render(); showToast('Contractor updated');
                return;
            }
            if (!tradeIds.length) { showToast('Choose a trade, or type a new one, for this contractor'); return; }
            const isMgr = !!(window.CloudJobs && window.CloudJobs.isManager && window.CloudJobs.isManager());
            const uid = (window.CloudJobs && window.CloudJobs.currentUserId) ? window.CloudJobs.currentUserId() : null;
            db.addContractor({ name, phone, email, tradeIds, isShared: isMgr, addedBy: isMgr ? null : uid });
            impClose();
            // No render() — keep any in-progress add-defects form intact; the new
            // contractor is in db.data and shows in the autocomplete immediately.
            showToast(isMgr ? 'Contractor added' : 'Contractor added — private to you for now');
        }
        // Manager action: promote a private supervisor-added contractor to the team.
        function shareContractor(legacyId) {
            const c = db.getContractor(legacyId);
            if (!c) return;
            c.isShared = true; c.addedBy = null;
            db.save();
            render();
            showToast('Contractor shared with the team');
        }
        function editContractor(id) { const c = db.getContractor(id); if (c) openAddContractor('', c); }
        function deletePendingContractor(id) {
            if (!confirm('Delete this contractor?')) return;
            const r = db.deleteContractor(id);
            if (r && r.success === false) { showToast(r.message); return; }
            render(); showToast('Contractor deleted');
        }
        // Manager-only Manage card: supervisor-added contractors awaiting review.
        function renderPendingContractors() {
            const isMgr = !!(window.CloudJobs && window.CloudJobs.isManager && window.CloudJobs.isManager());

            return `

                    <div style="font-size: 17px; font-weight: 600; margin-bottom: 5px; color: var(--text-primary);">🔎 Contractors to review${pending.length ? ' (' + pending.length + ')' : ''}</div>

              .imp-report small{color:var(--text-secondary,#888);}
              .imp-del{background:#FF3B30;color:#fff;border:0;border-radius:8px;padding:7px 12px;cursor:pointer;}
            `;
            document.head.appendChild(s);
        }

        function impClose() { const o = document.getElementById('imp-ov'); if (o) o.remove(); }
        function impOverlay(inner) {

        // ---- Step 1: choose a file or paste text ----
        function openReportImport() {
            const aiOn = window.CloudAI ? 'checked' : '';
            impOverlay(`
                <div id="imp-head"><strong>📄 Add Report</strong><button id="imp-close">✕</button></div>
                <div id="imp-body">
                    <div class="imp-field" style="margin-bottom:14px">

                        <input type="file" id="imp-file" accept=".pdf,.txt,text/plain,application/pdf" style="display:none">

                    <label style="display:flex;align-items:center;gap:8px;font-size:14px;margin:12px 0 4px">

                </div>`);
            const fileInput = document.getElementById('imp-file');
            document.getElementById('imp-drop').onclick = () => fileInput.click();
            fileInput.onchange = async (e) => {
                const f = e.target.files && e.target.files[0];
                if (!f) return;
                const reportType = (document.getElementById('imp-type') || {}).value || 'BPI';
                const useAI = !!((document.getElementById('imp-ai') || {}).checked && window.CloudAI);
                impSetBusy('Reading ' + f.name + '…');
                try {
                    // BPI reports: ALWAYS use structured extraction (location, page, trade)
                    // + job match — the AI path drops the structured columns, so we don't
                    // route BPI through it even when the AI toggle is on.
                    if (reportType === 'BPI' && ((f.name || '').toLowerCase().endsWith('.pdf') || f.type === 'application/pdf')) {
                        const paged = await extractReportTextPaged(f);
                        const items = parseBpiDefects(paged);
                        if (!items.length) { impOverlayMessage('No defects were found in that report.'); return; }
                        startReportReview(items, f.name, reportType, matchAddressFromText(paged, f.name));

                    }
                    const text = await extractReportText(f);
                    await extractAndReview(text, f.name, reportType, useAI);

                    console.error(err);
                    impOverlayMessage('Could not read that file: ' + (err.message || err));

            };
            document.getElementById('imp-extract').onclick = async () => {
                const text = document.getElementById('imp-paste').value;
