<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="0.55" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#sheen)"/>

  <!-- Clipboard / defect sheet -->
  <g filter="url(#shadow)">
    <rect x="150" y="132" width="212" height="256" rx="28" fill="#ffffff"/>
    <!-- clip -->
    <rect x="226" y="112" width="60" height="40" rx="14" fill="#E2E8F0"/>
    <rect x="240" y="100" width="32" height="28" rx="12" fill="#CBD5E1"/>
  </g>

  <!-- Checklist lines -->
  <g fill="#CBD5E1">
    <rect x="186" y="206" width="140" height="14" rx="7"/>
    <rect x="186" y="252" width="120" height="14" rx="7"/>
    <rect x="186" y="298" width="100" height="14" rx="7"/>
  </g>

  <!-- Big tick -->
  <path d="M196 300 l34 34 l86 -96"
        fill="none" stroke="#22C55E" stroke-width="30"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
